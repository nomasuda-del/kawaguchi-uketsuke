<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>川口弥平センター 受付システム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;}
button,input,select{font-family:inherit;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;}

/* ===== LAYOUT ===== */
.page{min-height:100vh;display:flex;flex-direction:column;}
.app-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-bottom:1px solid #e0ddd5;position:sticky;top:0;z-index:100;}
.app-bar-title{font-size:15px;font-weight:700;flex:1;}
.back-btn{padding:8px 4px;background:none;border:none;font-size:14px;color:#666;min-height:44px;}

/* ===== HOME ===== */
.home-hero{padding:18px 16px 12px;background:#fff;border-bottom:1px solid #e0ddd5;}
.home-title{font-size:20px;font-weight:800;}
.home-sub{font-size:12px;color:#666;margin-top:4px;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;}
.menu-card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:16px 14px;display:flex;flex-direction:column;gap:6px;min-height:90px;}
.menu-card.full{grid-column:1/-1;}
.menu-card.lotte{border-color:#7a2c00;background:#fdf0ea;}
.menu-card.dashed{border-style:dashed;}
.menu-icon{font-size:22px;}
.menu-label{font-size:14px;font-weight:700;}
.menu-sub{font-size:12px;color:#666;}
.alert-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:#fdeaea;color:#b02020;border:1px solid #e89090;width:fit-content;}
.admin-bar{background:#1a1a1a;color:#fff;padding:8px 16px;font-size:12px;display:flex;align-items:center;gap:8px;}
.logout-btn{font-size:11px;padding:6px 12px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;min-height:36px;}
.sync-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;}
.sync-live{background:#e8f5ea;color:#2d7a3a;}
.sync-off{background:#fdf3d8;color:#8a5c00;}
.alert-bar-home{margin:10px 16px 0;padding:10px 14px;background:#fdeaea;border:1px solid #e89090;border-radius:8px;font-size:12px;color:#b02020;font-weight:600;}

/* ===== TABLE ===== */
.tbl-wrap{overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:780px;}
thead th{background:#f0efe9;padding:7px 5px;font-size:11px;font-weight:700;color:#666;text-align:left;border-bottom:1px solid #e0ddd5;white-space:nowrap;position:sticky;top:0;z-index:5;}
tbody tr{border-bottom:1px solid #e0ddd5;}
tbody tr.row-ok{background:#e8f5ea;}
tbody tr.row-alert{background:#fdeaea;}
tbody tr.row-warn{background:#fdf3d8;}
tbody tr.row-del{background:#f0efe9;opacity:.55;}
td{padding:5px 4px;vertical-align:middle;}
td.no-col{font-size:11px;color:#999;text-align:center;width:26px;}
.t-in{width:100%;font-size:12px;padding:4px 5px;border:1px solid #ccc9be;border-radius:6px;background:#fff;color:#1a1a1a;min-width:0;}
.t-sel{font-size:12px;padding:4px 3px;border:1px solid #ccc9be;border-radius:6px;background:#fff;color:#1a1a1a;width:100%;}
.t-in:disabled,.t-sel:disabled{opacity:.45;}
.tw{display:flex;align-items:center;gap:3px;min-width:100px;}
.ti{width:60px;font-size:12px;padding:4px 3px;border:1px solid #ccc9be;border-radius:6px;background:#fff;color:#1a1a1a;text-align:center;}
.ti.err{border-color:#b02020;background:#fdeaea;}
.ti:disabled{opacity:.45;}
.sp{font-size:11px;padding:5px 8px;border:1px solid #ccc9be;border-radius:6px;background:#f0efe9;color:#666;white-space:nowrap;min-height:34px;}
.sp.done{background:#e8f5ea;border-color:#90c896;color:#2d7a3a;font-weight:700;}
.sp:disabled{opacity:.35;}
.db{width:44px;height:44px;border-radius:50%;border:1px solid #e89090;background:#fdeaea;color:#b02020;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.db:disabled{opacity:.3;}
.rb{width:44px;height:44px;border-radius:50%;border:1px solid #ccc9be;background:#f0efe9;color:#666;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;}
.dot-e{background:#ccc;}.dot-a{background:#2d7a3a;}.dot-w{background:#d4a017;}.dot-r{background:#b02020;}.dot-d{background:#1a7a4a;}.dot-x{background:#bbb;}

/* ===== FAB ===== */
.fab-area{padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;background:#fff;border-top:1px solid #e0ddd5;position:sticky;bottom:0;z-index:20;}
.fab-drv{width:100%;padding:18px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;min-height:58px;}
.fab-drv:disabled{opacity:.35;}
.fab-sm{padding:10px 14px;border:1px solid #ccc9be;border-radius:8px;background:#f0efe9;font-size:13px;font-weight:700;min-height:42px;}
.mod-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12px;border-bottom:1px solid #e0ddd5;flex-wrap:wrap;}
.mod-bar.today{background:#e8f5ea;color:#2d7a3a;}
.mod-bar.past{background:#e8f0fb;color:#1a5fa8;}
.mod-bar.edit{background:#fdf3d8;color:#8a5c00;}
.mod-btn{font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid currentColor;background:#fff;font-weight:600;min-height:34px;}
.date-nav{display:flex;align-items:center;gap:8px;padding:7px 14px;background:#f0efe9;border-bottom:1px solid #e0ddd5;flex-wrap:wrap;}
.date-sel{font-size:13px;padding:5px 8px;border:1px solid #ccc9be;border-radius:6px;background:#fff;flex:1;max-width:240px;}
.dt-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;}
.dt-today{background:#e8f5ea;color:#2d7a3a;border:1px solid #90c896;}
.dt-past{background:#e8f0fb;color:#1a5fa8;border:1px solid #a8c4e8;}
.dt-edit{background:#fdf3d8;color:#8a5c00;border:1px solid #e8c96a;}
.alert-strip{background:#fdeaea;border:1px solid #e89090;border-radius:8px;margin:6px 14px;padding:8px 12px;font-size:12px;color:#b02020;font-weight:600;}
.edit-log-td{font-size:11px;color:#666;padding:2px 4px 5px!important;}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:9999;}
.modal{background:#fff;border-radius:12px;width:100%;max-width:440px;padding:22px;max-height:88vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:800;margin-bottom:14px;}
.modal-rec{background:#f0efe9;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;line-height:1.8;}
.modal-body{font-size:13px;color:#666;line-height:1.7;margin-bottom:4px;}
.fg{margin-bottom:10px;}
.fg label{font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:4px;}
.fg input,.fg select{width:100%;font-size:15px;padding:9px 10px;border:1px solid #ccc9be;border-radius:8px;background:#fff;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-acts{display:flex;gap:8px;margin-top:16px;}
.btn-ok{flex:1;padding:14px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;min-height:50px;}
.btn-ng{flex:1;padding:14px;background:#b02020;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;min-height:50px;}
.btn-cl{padding:14px 18px;background:transparent;border:1px solid #ccc9be;border-radius:8px;font-size:15px;font-weight:600;color:#666;min-height:50px;}

/* ===== LOGIN ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#f5f4f0;}
.login-card{background:#fff;border-radius:16px;padding:32px 28px;width:100%;max-width:340px;}
.login-logo{text-align:center;font-size:36px;margin-bottom:8px;}
.login-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:#666;text-align:center;margin-bottom:24px;line-height:1.6;}
.login-inp{width:100%;font-size:16px;padding:12px;border:1px solid #ccc9be;border-radius:8px;background:#fff;margin-bottom:12px;}
.login-btn{width:100%;padding:16px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:800;min-height:54px;}
.login-err{font-size:13px;color:#b02020;text-align:center;margin-top:8px;min-height:20px;}

/* ===== WIZARD ===== */
.wiz-wrap{height:100vh;display:flex;flex-direction:column;background:#f5f4f0;overflow:hidden;}
.wiz-hdr{background:#fff;border-bottom:1px solid #e0ddd5;flex-shrink:0;}
.wiz-hdr-row{display:flex;align-items:center;gap:10px;padding:12px 16px;}
.wiz-back{width:44px;height:44px;border-radius:50%;border:none;background:#f0efe9;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wiz-title{font-size:17px;font-weight:800;}
.wiz-step-lbl{font-size:12px;color:#666;margin-top:2px;}
.wiz-prog-bg{height:4px;background:#e0ddd5;}
.wiz-prog-bar{height:4px;background:#1a1a1a;transition:width .3s;}

/* tel step 専用 */
.tel-disp{background:#fff;text-align:center;padding:14px 20px 10px;flex-shrink:0;border-bottom:1px solid #e0ddd5;}
.tel-num{font-size:34px;font-weight:800;letter-spacing:.08em;color:#1a1a1a;min-height:46px;display:flex;align-items:center;justify-content:center;}
.tel-num.empty{font-size:20px;color:#ccc;font-weight:400;}
.tel-hint{font-size:12px;color:#999;margin-top:4px;}
.tel-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 14px 4px;flex-shrink:0;}
.tel-key{height:68px;border-radius:12px;border:1px solid #ccc9be;background:#fff;font-size:26px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
.tel-key:active{background:#f0efe9;}
.tel-key-sub{font-size:9px;font-weight:400;color:#999;letter-spacing:.06em;}
.tel-del{background:#f0efe9;color:#666;font-size:20px;}
.tel-result{padding:8px 14px;flex-shrink:0;min-height:62px;}
.tel-found{background:#e8f5ea;border:1px solid #90c896;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.tel-new{background:#fdf3d8;border:1px solid #e8c96a;border-radius:10px;padding:10px 14px;}
.tel-empty{padding:10px 14px;font-size:12px;color:#999;text-align:center;}

/* wizard other steps */
.wiz-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 18px 16px;}
.wiz-section-title{font-size:22px;font-weight:800;margin-bottom:16px;line-height:1.3;}
.wiz-field{background:#fff;border:1px solid #e0ddd5;border-radius:12px;overflow:hidden;margin-bottom:12px;}
.wiz-row{display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #e0ddd5;}
.wiz-row:last-child{border-bottom:none;}
.wiz-lbl{font-size:13px;color:#666;width:80px;flex-shrink:0;font-weight:600;padding:14px 0;}
.wiz-inp{flex:1;font-size:17px;font-weight:500;padding:14px 8px;border:none;background:transparent;color:#1a1a1a;outline:none;width:100%;}
.wiz-inp::placeholder{color:#ccc;font-weight:400;font-size:15px;}
.wiz-sel{flex:1;font-size:17px;font-weight:500;padding:14px 8px;border:none;background:transparent;color:#1a1a1a;outline:none;-webkit-appearance:none;}
.wiz-confirm-card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;overflow:hidden;margin-bottom:14px;}
.wiz-confirm-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #e0ddd5;}
.wiz-confirm-row:last-child{border-bottom:none;}
.wiz-confirm-lbl{font-size:13px;color:#666;width:80px;flex-shrink:0;font-weight:600;}
.wiz-confirm-val{font-size:16px;font-weight:700;}
.consent-box{background:#fff;border:2px solid #ccc9be;border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.consent-box.checked{border-color:#2d7a3a;}
.consent-check{width:28px;height:28px;border-radius:6px;border:2px solid #ccc9be;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;font-weight:800;color:#fff;background:transparent;}
.consent-check.checked{background:#2d7a3a;border-color:#2d7a3a;}
.consent-lbl{font-size:15px;font-weight:700;}
.privacy-box{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.9;color:#666;max-height:220px;overflow-y:auto;margin-bottom:14px;}
.stamp-note{background:#e8f5ea;border:1px solid #90c896;border-radius:10px;padding:12px 14px;font-size:13px;color:#2d7a3a;font-weight:600;line-height:1.7;}

.wiz-footer{padding:10px 16px;background:#fff;border-top:1px solid #e0ddd5;flex-shrink:0;}
.wiz-next-btn{width:100%;padding:18px;background:#1a1a1a;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:800;min-height:58px;}
.wiz-next-btn:disabled{opacity:.35;}
.wiz-next-btn.green{background:#2d7a3a;}

/* ===== HISTORY / DRIVERS / EXPORT ===== */
.list-wrap{padding:0 14px 80px;}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff;border:1px solid #e0ddd5;border-radius:8px;margin-bottom:7px;}
.list-title{font-size:14px;font-weight:700;}
.list-sub{font-size:12px;color:#666;margin-top:2px;}
.drv-card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.drv-av{width:38px;height:38px;border-radius:50%;background:#e8f0fb;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1a5fa8;flex-shrink:0;}
.exp-card{background:#fff;border:1px solid #e0ddd5;border-radius:12px;padding:14px;margin-bottom:10px;}
.exp-card h4{font-size:14px;font-weight:700;margin-bottom:4px;}
.exp-card p{font-size:12px;color:#666;margin-bottom:10px;line-height:1.6;}
.exp-btn{padding:8px 14px;border:1px solid #ccc9be;border-radius:8px;font-size:13px;font-weight:600;background:#f0efe9;margin-right:6px;margin-bottom:4px;}
.section-lbl{font-size:11px;font-weight:700;color:#666;padding:10px 16px 4px;letter-spacing:.06em;}

/* ===== PIN ===== */
.pin-disp{display:flex;justify-content:center;gap:14px;margin:16px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #ccc9be;}
.pin-dot.on{background:#1a1a1a;border-color:#1a1a1a;}
.pin-dot.err{background:#b02020;border-color:#b02020;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
.pin-key{height:58px;border-radius:10px;border:1px solid #ccc9be;background:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.pin-key:active{background:#f0efe9;}
.pin-del{background:#f0efe9;color:#666;font-size:18px;}
.pin-zero{grid-column:2;}
.pin-err{font-size:12px;color:#b02020;text-align:center;margin-top:8px;min-height:18px;}

@media(max-width:480px){.menu-grid{grid-template-columns:1fr;}.menu-card.full{grid-column:1;}}
</style>
</head>
<body>
<div id="root"></div>
<div id="mc"></div>


<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
// Firebase設定（現在未使用）

// ============================================================
// CONSTANTS
// ============================================================
var SHAKAKU = ['2t','4t','大型','コンテナ','軽'];
var TSUMI = ['バラ','PL'];
var LSRC = ['狭山工場','狭山工場倉庫','浦和工場','第一倉庫','戸田','滋賀工場','九州工場','その他'];
var ADMIN_PASS_KEY = 'kw_admin_pw';
var PIN_KEY = 'kw_pin';
var SESSION_KEY = 'kw_sess';
var DB_KEY = 'kw_db_v5';
var DR_KEY = 'kw_dr_v5';

// ============================================================
// HELPERS
// ============================================================
function todayKey() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n){ return String(n).padStart(2,'0'); }
function fmtKey(k) {
  var p = k.split('-');
  var wd = ['日','月','火','水','木','金','土'];
  var dt = new Date(+p[0], +p[1]-1, +p[2]);
  return p[0]+'年'+p[1]+'月'+p[2]+'日（'+wd[dt.getDay()]+'）';
}
function nowStr() {
  var d = new Date();
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}
function nowFull() {
  var d = new Date();
  return (d.getMonth()+1)+'/'+d.getDate()+' '+nowStr();
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function mkNRow(no) {
  return {id:uid(),no:no,fuda:'',company:'',name:'',tel:'',car:'',shakaku:'2t',tsumi:'バラ',nyuuko:'',shukko:'',biko:'',deleted:false,editLog:[]};
}
function mkLRow(no) {
  return {id:uid(),no:no,company:'',name:'',tel:'',car:'',shakaku:'2t',order:'',type:'入荷',src:'狭山工場',srcOther:'',tochaku:'',basu:'',sakuEnd:'',shuppatsu:'',deleted:false,editLog:[]};
}
function ensureDay(db, key) {
  if (!db[key]) {
    db[key] = {
      nyuuka: Array.from({length:20}, function(_,i){ return mkNRow(i+1); }),
      shukka: Array.from({length:20}, function(_,i){ return mkNRow(i+1); }),
      lotte:  Array.from({length:15}, function(_,i){ return mkLRow(i+1); }),
      created: key
    };
  }
  return db[key];
}
function toMin(t) {
  if (!t) return null;
  var p = t.split(':');
  return +p[0]*60 + +p[1];
}
function elapsed(t) {
  if (!t) return null;
  var b = toMin(t);
  var n = new Date();
  return n.getHours()*60 + n.getMinutes() - b;
}
function timeOk(a,b) {
  if (!a||!b) return true;
  return toMin(a) <= toMin(b);
}

// ============================================================
// AUTH
// ============================================================
function getAdminPass(){ return localStorage.getItem(ADMIN_PASS_KEY)||'kawaguchi2024'; }
function getPin(){ return localStorage.getItem(PIN_KEY)||null; }
function setPin(p){ if(p) localStorage.setItem(PIN_KEY,p); else localStorage.removeItem(PIN_KEY); }
function isAdmin(){ return sessionStorage.getItem(SESSION_KEY)==='1'; }
function doLogin(pw){ if(pw===getAdminPass()){ sessionStorage.setItem(SESSION_KEY,'1'); return true; } return false; }
function doLogout(){ sessionStorage.removeItem(SESSION_KEY); S.screen='home'; render(); }

// ============================================================
// DATA
// ============================================================
var S = {
  screen: 'home',
  viewDate: todayKey(),
  editMode: false,
  modal: null,
  modalData: {},
  alertWarn: 60,
  alertDanger: 90,
  db: {},
  drivers: []
};
var fbDb = null;
var syncStatus = 'local';

try { S.db = JSON.parse(localStorage.getItem(DB_KEY)||'{}'); } catch(e){}
try { S.drivers = JSON.parse(localStorage.getItem(DR_KEY)||'[]'); } catch(e){}
ensureDay(S.db, todayKey());

function save() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(S.db)); } catch(e){}
  try { localStorage.setItem(DR_KEY, JSON.stringify(S.drivers)); } catch(e){}
}
function initFb() {
  // Firebase無効（ローカルモード）
  syncStatus = 'offline';
}

var _telState = {type:'',id:'',buf:''};
function openTelModal(type,id){
  var day=S.db[S.viewDate]; var r=day[type].find(function(x){return x.id===id;});
  if(!r)return;
  _telState={type:type,id:id,buf:(r.tel||'').replace(/[-\s]/g,'')};
  renderTelModal();
}
function renderTelModal(){
  mc.innerHTML='';
  var ts=_telState; var buf=ts.buf;
  var day=S.db[S.viewDate]; var r=day[ts.type].find(function(x){return x.id===ts.id;});
  if(!r)return;
  var disp=buf.length>0?buf.replace(/^(\d{3})(\d{4})(\d{0,4})$/,'$1-$2-$3').replace(/-$/,''):'';
  var drv=buf.length>=10?findDriver(buf):null;

  var overlay=el('div'); overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:9998;';

function wizFlow(){
  if(WIZ.type==='lotte'){
    return WIZ.isNew?['tel','name','car','lotte_info','consent','final']:['tel','confirm','lotte_info','final'];
  }
  return WIZ.isNew?['tel','name','car','consent','final']:['tel','confirm','final'];
}
function startWiz(type){
  WIZ.active=true; WIZ.type=type; WIZ.step='tel';
  WIZ.tel=''; WIZ.company=''; WIZ.name=''; WIZ.car=''; WIZ.shakaku='2t'; WIZ.tsumi='バラ'; WIZ.fuda='';
  WIZ.order=''; WIZ.nyukaType='入荷'; WIZ.src='狭山工場'; WIZ.srcOther='';
  WIZ.driver=null; WIZ.isNew=false; WIZ.consent=false;
  render();
}
function wizBack(){
  var flow=wizFlow(); var idx=flow.indexOf(WIZ.step);
  if(idx<=0){WIZ.active=false;render();return;}
  WIZ.step=flow[idx-1]; render();
}
function wizNext(){
  var flow=wizFlow(); var idx=flow.indexOf(WIZ.step);
  if(WIZ.step==='tel'){
    var d=findDriver(WIZ.tel);
    if(d){ WIZ.driver=d; WIZ.isNew=false; WIZ.company=d.company||''; WIZ.name=d.name||''; WIZ.car=d.car||''; WIZ.shakaku=d.shakaku||'2t'; WIZ.step='confirm'; }
    else { WIZ.driver=null; WIZ.isNew=true; WIZ.step='name'; }
  } else if(WIZ.step==='confirm'){
    var c=document.getElementById('wc-company'); var n=document.getElementById('wc-name'); var car=document.getElementById('wc-car'); var sh=document.getElementById('wc-shakaku');
    if(c)WIZ.company=c.value.trim(); if(n)WIZ.name=n.value.trim(); if(car)WIZ.car=car.value.trim(); if(sh)WIZ.shakaku=sh.value;
    WIZ.step=flow[idx+1];
  } else if(WIZ.step==='name'){
    var c2=document.getElementById('wn-company'); var n2=document.getElementById('wn-name');
    if(c2)WIZ.company=c2.value.trim(); if(n2)WIZ.name=n2.value.trim();
    WIZ.step='car';
  } else if(WIZ.step==='car'){
    var car2=document.getElementById('wcar-car'); var sh2=document.getElementById('wcar-shakaku'); var ts=document.getElementById('wcar-tsumi'); var fd=document.getElementById('wcar-fuda');
    if(car2)WIZ.car=car2.value.trim(); if(sh2)WIZ.shakaku=sh2.value; if(ts)WIZ.tsumi=ts.value; if(fd)WIZ.fuda=fd.value;
    WIZ.step=flow[idx+1];
  } else if(WIZ.step==='lotte_info'){
    var ord=document.getElementById('wl-order'); var typ=document.getElementById('wl-type'); var src=document.getElementById('wl-src'); var sro=document.getElementById('wl-srcother');
    if(ord)WIZ.order=ord.value.trim(); if(typ)WIZ.nyukaType=typ.value; if(src)WIZ.src=src.value; if(sro)WIZ.srcOther=sro.value.trim();
    WIZ.step=flow[idx+1];
  } else if(WIZ.step==='consent'){
    WIZ.step='final';
  }
  render();
}
function wizComplete(){
  var day=todayData();
  if(WIZ.type==='lotte'){
    var arr=day.lotte; var slot=arr.find(function(r){return !r.company&&!r.tochaku&&!r.deleted;});
    var r=slot||mkLRow(arr.length+1);
    r.tel=WIZ.tel; r.company=WIZ.company; r.name=WIZ.name; r.car=WIZ.car; r.shakaku=WIZ.shakaku;
    r.order=WIZ.order; r.type=WIZ.nyukaType; r.src=WIZ.src; r.srcOther=WIZ.src==='その他'?WIZ.srcOther:'';
    r.tochaku=nowStr(); r.basu=''; r.sakuEnd=''; r.shuppatsu='';
    if(!slot)arr.push(r);
  } else {
    var arr2=day[WIZ.type]; var slot2=arr2.find(function(r){return !r.company&&!r.nyuuko&&!r.deleted;});
    var r2=slot2||mkNRow(arr2.length+1);
    r2.tel=WIZ.tel; r2.company=WIZ.company; r2.name=WIZ.name; r2.car=WIZ.car; r2.shakaku=WIZ.shakaku; r2.tsumi=WIZ.tsumi||'バラ'; r2.fuda=WIZ.fuda||'';
    r2.nyuuko=nowStr();
    if(!slot2)arr2.push(r2);
  }
  if(WIZ.isNew&&WIZ.consent&&WIZ.tel&&WIZ.name){
    S.drivers.push({id:uid(),company:WIZ.company,name:WIZ.name,tel:WIZ.tel,car:WIZ.car,shakaku:WIZ.shakaku});
  }
  if(WIZ.driver){
    var didx=S.drivers.findIndex(function(d){return d.tel===WIZ.tel;});
    if(didx>=0) S.drivers[didx]=Object.assign(S.drivers[didx],{company:WIZ.company,name:WIZ.name,car:WIZ.car,shakaku:WIZ.shakaku});
  }
  save();
  WIZ.active=false; S.viewDate=todayKey(); S.screen=WIZ.type; render();
}

    tsRow.appendChild(tsLbl); tsRow.appendChild(tsSel2); fbox4.appendChild(tsRow);
    var fdRow=el('div','wiz-row'); var fdLbl=el('div','wiz-lbl'); fdLbl.textContent='番号札';
    var fdInp=el('input','wiz-inp'); fdInp.type='number'; fdInp.id='wcar-fuda'; fdInp.value=WIZ.fuda||''; fdInp.placeholder='夜間番号（任意）';
    fdRow.appendChild(fdLbl); fdRow.appendChild(fdInp); fbox4.appendChild(fdRow);
    body.appendChild(fbox4);

  } else if(WIZ.step==='lotte_info'){
    var stl4=el('div','wiz-section-title'); stl4.textContent='オーダー情報を
入力してください'; body.appendChild(stl4);
    var fbox5=el('div','wiz-field');
    var ordRow=el('div','wiz-row'); var ordLbl=el('div','wiz-lbl'); ordLbl.textContent='オーダーNo';
    var ordInp=el('input','wiz-inp'); ordInp.type='text'; ordInp.id='wl-order'; ordInp.value=WIZ.order; ordInp.placeholder='例: 12345';
    ordRow.appendChild(ordLbl); ordRow.appendChild(ordInp); fbox5.appendChild(ordRow);
    var tyRow=el('div','wiz-row'); var tyLbl=el('div','wiz-lbl'); tyLbl.textContent='入荷/出荷';
    var tySel3=el('select','wiz-sel'); tySel3.id='wl-type';
    ['入荷','出荷'].forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;if(WIZ.nyukaType===s)o.selected=true;tySel3.appendChild(o);});
    tyRow.appendChild(tyLbl); tyRow.appendChild(tySel3); fbox5.appendChild(tyRow);
    var srcRow=el('div','wiz-row'); var srcLbl=el('div','wiz-lbl'); srcLbl.textContent='出発元';
    var srcSel2=el('select','wiz-sel'); srcSel2.id='wl-src';
    LSRC.forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;if(WIZ.src===s)o.selected=true;srcSel2.appendChild(o);});
    srcSel2.onchange=function(){WIZ.src=this.value;renderWiz();};
    srcRow.appendChild(srcLbl); srcRow.appendChild(srcSel2); fbox5.appendChild(srcRow);
    if(WIZ.src==='その他'){
      var soRow=el('div','wiz-row'); var soLbl=el('div','wiz-lbl'); soLbl.textContent='その他';
      var soInp=el('input','wiz-inp'); soInp.type='text'; soInp.id='wl-srcother'; soInp.value=WIZ.srcOther; soInp.placeholder='出発元を入力';
      soRow.appendChild(soLbl); soRow.appendChild(soInp); fbox5.appendChild(soRow);
    }
    body.appendChild(fbox5);
    var note=el('div'); note.style.cssText='font-size:12px;color:#666;line-height:1.7;padding:4px 0;'; note.textContent='※ バース着車・作業終了・出発時間は一覧画面から打刻してください'; body.appendChild(note);

  } else if(WIZ.step==='consent'){
    var stl5=el('div','wiz-section-title'); stl5.textContent='個人情報の
取り扱いについて'; body.appendChild(stl5);
    var pbox=el('div','privacy-box');
    pbox.innerHTML='<div style="font-weight:700;color:#1a1a1a;margin-bottom:8px;font-size:14px;">個人情報の取り扱いに関するご説明</div>'+
      'ご入力いただいた氏名・電話番号・車両情報などの個人情報は、川口弥平センターにおける入荷・出荷受付業務の管理のみを目的として利用します。<br><br>'+
      '<b style="color:#1a1a1a;">利用目的</b><br>・入荷・出荷受付の記録および管理<br>・次回以降の受付における自動入力<br>・取適法に基づく記録保管<br><br>'+
      '<b style="color:#1a1a1a;">第三者提供</b><br>法令に基づく場合を除き、第三者への提供は行いません。<br><br>'+
      '<b style="color:#1a1a1a;">管理・削除</b><br>情報の確認・修正・削除をご希望の場合はセンター管理者までお申し付けください。';
    body.appendChild(pbox);
    var cbox=el('div','consent-box'+(WIZ.consent?' checked':''));
    cbox.onclick=function(){WIZ.consent=!WIZ.consent;renderWiz();};
    var cc=el('div','consent-check'+(WIZ.consent?' checked':'')); cc.textContent=WIZ.consent?'✓':''; cbox.appendChild(cc);
    var cl2=el('div','consent-lbl'); cl2.style.color=WIZ.consent?'#2d7a3a':'#1a1a1a'; cl2.textContent='上記の内容に同意します'; cbox.appendChild(cl2);
    body.appendChild(cbox);

  } else if(WIZ.step==='final'){
    var stl6=el('div','wiz-section-title'); stl6.textContent='内容を確認して
受付を完了'; body.appendChild(stl6);
    var cc2=el('div','wiz-confirm-card');
    var rows3=[
      ['電話番号',WIZ.tel.replace(/^(\d{3})(\d{4})(\d{4})$/,'$1-$2-$3')],
      ['運送会社',WIZ.company||'―'],['お名前',WIZ.name||'―'],
      ['車番',WIZ.car||'―'],['車格',WIZ.shakaku]
    ];
    if(WIZ.type==='lotte'){
      rows3.push(['オーダーNo',WIZ.order||'―'],['入荷/出荷',WIZ.nyukaType],['出発元',WIZ.src==='その他'?WIZ.srcOther:WIZ.src]);
    } else {
      rows3.push(['積み方',WIZ.tsumi||'バラ']);
    }
    rows3.forEach(function(r){ var row=el('div','wiz-confirm-row'); var lbl=el('div','wiz-confirm-lbl'); lbl.textContent=r[0]; var val=el('div','wiz-confirm-val'); val.textContent=r[1]; row.appendChild(lbl); row.appendChild(val); cc2.appendChild(row); });
    body.appendChild(cc2);
    var sn=el('div','stamp-note');
    sn.textContent=WIZ.type==='lotte'?'「受付完了 ＋ 到着打刻」で現在時刻が到着時間に登録されます。バース・作業終了・出発は一覧から打刻してください。':'「受付完了 ＋ 入庫打刻」で現在時刻が入庫時間に登録されます。';
    body.appendChild(sn);
  }

  wrap2.appendChild(body);
  var ft2=el('div','wiz-footer');
  var nb2=el('button','wiz-next-btn'+(WIZ.step==='final'?' green':''));
  if(WIZ.step==='final'){ nb2.textContent=WIZ.type==='lotte'?'受付完了 ＋ 到着打刻':'受付完了 ＋ 入庫打刻'; nb2.onclick=wizComplete; }
  else { nb2.textContent=(WIZ.step==='consent'&&!WIZ.consent)?'同意してから次へ進んでください':'次へ　→'; if(WIZ.step==='consent'&&!WIZ.consent)nb2.disabled=true; nb2.onclick=wizNext; }
  ft2.appendChild(nb2); wrap2.appendChild(ft2);
  root.appendChild(wrap2);
}

// ============================================================
// BOOT
// ============================================================
render();
setInterval(function(){
  if(!S.modal&&!WIZ.active&&['nyuuka','shukka','lotte','home'].indexOf(S.screen)>=0) render();
}, 30000);
</script>
</body>
</html>
