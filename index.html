<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>川口弥平センター 受付システム</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
input,select,textarea{font-size:16px!important;}
button{-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;cursor:pointer;user-select:none;-webkit-appearance:none;}
input,select{touch-action:manipulation;-webkit-appearance:none;}
html,body{height:100%;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px;background:#f5f4f0;color:#1a1a1a;}
input,select,button,textarea{font-family:inherit;}
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0efe9;--border:#e0ddd5;--border2:#ccc9be;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;--blue-bd:#a8c4e8;
  --green:#2d7a3a;--green-bg:#e8f5ea;--green-bd:#90c896;
  --amber:#8a5c00;--amber-bg:#fdf3d8;--amber-bd:#e8c96a;
  --red:#b02020;--red-bg:#fdeaea;--red-bd:#e89090;
  --lotte:#7a2c00;--lotte-bg:#fdf0ea;
  --radius:8px;--radius-lg:12px;
}
#app{display:flex;flex-direction:column;min-height:100vh;}
.app-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.app-bar-title{font-size:15px;font-weight:700;flex:1;}
.back-btn{display:flex;align-items:center;gap:4px;font-size:15px;color:var(--text2);background:none;border:none;padding:10px 16px 10px 4px;min-height:44px;}
.back-btn:active{opacity:.6;}
.bar-badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap;}
.bar-badge.sync{background:var(--blue-bg);color:var(--blue);}
.bar-badge.offline{background:var(--amber-bg);color:var(--amber);}
.home-hero{padding:20px 16px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
.home-title{font-size:22px;font-weight:800;letter-spacing:-.02em;}
.home-subtitle{font-size:12px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.home-alert-bar{margin:12px 16px 0;padding:10px 14px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius);font-size:13px;color:var(--red);font-weight:600;display:none;}
.home-alert-bar.show{display:block;}
.menu-grid{display:grid;grid-template-columns:1fr;gap:12px;padding:16px;}
.menu-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 14px;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;gap:5px;}
.menu-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.menu-card:active{transform:scale(.98);}
.menu-card.lotte-card{border-color:var(--lotte);background:var(--lotte-bg);}
.menu-card-icon{font-size:22px;line-height:1;}
.menu-card-label{font-size:14px;font-weight:700;}
.menu-card-sub{font-size:12px;color:var(--text2);}
.menu-card-alert{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);width:fit-content;margin-top:2px;}
.date-nav{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.date-nav select{font-size:13px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);flex:1;min-width:0;max-width:240px;}
.mode-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
.mode-tag.today{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.mode-tag.past{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd);}
.mode-tag.editing{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}
.mod-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.mod-bar.today{background:var(--green-bg);color:var(--green);}
.mod-bar.past{background:var(--blue-bg);color:var(--blue);}
.mod-bar.editing{background:var(--amber-bg);color:var(--amber);}
.mod-bar-msg{flex:1;font-weight:600;}
.toggle-edit-btn{font-size:12px;padding:5px 12px;border-radius:var(--radius);border:1px solid currentColor;background:var(--surface);cursor:pointer;font-weight:600;white-space:nowrap;color:inherit;}
.alert-bar{margin:8px 14px;padding:8px 12px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius);font-size:12px;color:var(--red);font-weight:600;}
.tbl-wrap{overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:800px;table-layout:fixed;}
thead th{background:var(--surface2);padding:7px 5px;font-size:11px;font-weight:700;color:var(--text2);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;z-index:10;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--surface2);}
tbody tr.row-ok{background:#e8f5ea;}
tbody tr.row-alert{background:#fdeaea;}
tbody tr.row-warn{background:#fdf3d8;}
tbody tr.row-deleted{background:var(--gray-bg,#f0efe9);opacity:.55;}
td{padding:5px 4px;vertical-align:middle;}
td.no-col{font-size:11px;color:var(--text3);text-align:center;width:26px;}
.t-input{width:100%;font-size:16px;padding:7px 6px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);min-width:0;-webkit-appearance:none;touch-action:manipulation;}
.t-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-bg);}
.t-select{font-size:16px;padding:7px 4px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text);width:100%;-webkit-appearance:none;touch-action:manipulation;}
.t-input:disabled,.t-select:disabled{opacity:.45;cursor:not-allowed;}
.time-wrap{display:flex;align-items:center;gap:4px;min-width:120px;}
.time-inp{width:62px;font-size:16px;padding:8px 4px;border:1px solid var(--border2);border-radius:6px;text-align:center;letter-spacing:.04em;font-weight:500;-webkit-appearance:none;background:var(--surface);color:var(--text);}
.time-inp.err{border-color:var(--red);background:var(--red-bg);}
.time-inp:disabled{opacity:.45;}
.time-inp::placeholder{font-size:11px;font-weight:400;letter-spacing:0;color:#bbb;}
.stamp-btn{font-size:14px;padding:9px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);color:var(--text2);white-space:nowrap;transition:background .1s;font-weight:600;min-height:40px;}
.stamp-btn:active,.stamp-btn:hover{background:var(--border);}
.stamp-btn.stamped{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);font-weight:700;}
.stamp-btn:disabled{opacity:.35;cursor:not-allowed;}
.del-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--red-bd);background:var(--red-bg);color:var(--red);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;}
.del-btn:active{transform:scale(.92);}
.del-btn:disabled{opacity:.3;cursor:not-allowed;}
.restore-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;}
.restore-btn:active{transform:scale(.92);}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;flex-shrink:0;}
.dot-empty{background:#ccc;}.dot-active{background:#2d7a3a;}.dot-warn{background:#d4a017;}.dot-alert{background:#b02020;}.dot-done{background:#1a7a4a;}.dot-del{background:#bbb;}
.fab-area{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;background:var(--surface);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:20;}
.fab-driver{width:100%;padding:20px 16px;border-radius:14px;border:none;background:var(--text);color:var(--surface);font-size:20px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;user-select:none;transition:opacity .1s,transform .1s;}
.fab-driver:active{opacity:.85;transform:scale(.98);}
.fab-driver:disabled{opacity:.35;transform:none;}
.fab-driver-icon{font-size:26px;line-height:1;}
.fab-sub-row{display:flex;gap:8px;width:100%;}
.fab-sub{flex:1;padding:12px 8px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;user-select:none;}
.fab-sub:active{background:var(--border);}
.fab{padding:9px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);font-size:13px;font-weight:700;cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;user-select:none;}
.fab:hover{background:var(--surface2);}
.fab:active{transform:scale(.97);}
.fab-primary{background:var(--text);color:var(--surface);border-color:var(--text);}
.fab-primary:hover{opacity:.88;}
.fab:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.edit-log-row td{font-size:11px;color:var(--text2);padding:2px 4px 5px;border-bottom:none;background:transparent!important;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:500;}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:100%;max-width:460px;padding:22px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:17px;font-weight:800;margin-bottom:16px;}
.modal-record{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px;font-size:13px;line-height:1.8;}
.modal-body{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:4px;}
.fg{margin-bottom:11px;}
.fg label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;}
.fg input,.fg select{width:100%;font-size:14px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-bg);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.btn-ok{flex:1;padding:11px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;}
.btn-danger{flex:1;padding:11px;background:var(--red);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;}
.btn-cancel{padding:11px 16px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;}
.list-wrap{padding:0 14px 80px;}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:7px;cursor:pointer;transition:border-color .1s;}
.list-item:hover{border-color:var(--border2);}
.list-item-title{font-size:14px;font-weight:700;}
.list-item-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.list-arrow{font-size:18px;color:var(--text3);}
.driver-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.driver-avatar{width:38px;height:38px;border-radius:50%;background:var(--blue-bg);border:1px solid var(--blue-bd);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--blue);flex-shrink:0;}
.export-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;}
.export-card h4{font-size:14px;font-weight:700;margin-bottom:4px;}
.export-card p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6;}
.export-btn{padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-weight:600;background:var(--surface2);cursor:pointer;margin-right:6px;margin-bottom:4px;}
.export-btn:hover{background:var(--border);}
.section-label{font-size:11px;font-weight:700;color:var(--text2);padding:10px 16px 4px;letter-spacing:.06em;}
.hidden{display:none!important;}
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px 28px;width:100%;max-width:340px;}
.login-logo{font-size:32px;text-align:center;margin-bottom:8px;}
.login-title{font-size:18px;font-weight:800;text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:24px;}
.login-fg{margin-bottom:14px;}
.login-fg label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;}
.login-fg input{width:100%;font-size:15px;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);}
.login-fg input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-bg);}
.login-btn{width:100%;padding:12px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.login-btn:hover{opacity:.88;}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px;}
.pin-display{display:flex;justify-content:center;gap:12px;margin:16px 0;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);background:transparent;transition:background .15s,border-color .15s;}
.pin-dot.filled{background:var(--text);border-color:var(--text);}
.pin-dot.err{border-color:var(--red);background:var(--red);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pin-key{height:56px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s,transform .1s;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;color:var(--text);}
.pin-key:active{background:var(--border);transform:scale(.94);}
.pin-key.pin-del-key{font-size:16px;color:var(--text2);}
.pin-key.pin-zero{grid-column:2;}
.pin-title{font-size:15px;font-weight:700;text-align:center;margin-bottom:4px;}
.pin-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:16px;}
.pin-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:16px;}
.tel-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:600;padding:0;}
.tel-modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:0 0 env(safe-area-inset-bottom,12px);max-height:96vh;overflow-y:auto;}
.tel-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);}
.tel-modal-title{font-size:17px;font-weight:800;}
.tel-modal-close{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.tel-display{text-align:center;padding:14px 20px 10px;font-size:34px;font-weight:800;letter-spacing:.1em;color:var(--text);min-height:64px;}
.tel-display.placeholder{color:var(--border2);font-size:22px;font-weight:400;}
.tel-lookup-result{margin:0 16px 12px;padding:12px 16px;border-radius:var(--radius-lg);font-size:14px;line-height:1.8;display:none;}
.tel-lookup-result.found{background:var(--green-bg);border:1px solid var(--green-bd);display:block;}
.tel-lookup-result.notfound{background:var(--surface2);border:1px solid var(--border);display:block;color:var(--text2);}
.tel-lookup-name{font-size:18px;font-weight:800;color:var(--green);}
.tel-lookup-sub{font-size:13px;color:var(--text2);}
.tel-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 16px 16px;}
.tel-key{height:64px;border-radius:12px;border:1px solid var(--border2);background:var(--surface);font-size:26px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:background .08s,transform .08s;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;color:var(--text);user-select:none;}
.tel-key:active{background:var(--surface2);transform:scale(.94);}
.tel-key-sub{font-size:9px;font-weight:400;color:var(--text3);}
.tel-key.tel-del{background:var(--surface2);color:var(--text2);font-size:20px;}
.tel-key.tel-ok{background:var(--text);color:var(--surface);font-size:16px;font-weight:700;border-color:var(--text);}
.tel-fields{padding:0 16px 8px;display:none;}
.tel-fields.show{display:block;}
.tel-field-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.tel-field-row:last-child{border-bottom:none;}
.tel-field-label{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;font-weight:600;}
.tel-field-val{flex:1;font-size:16px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);}
.tel-confirm-btn{display:block;width:calc(100% - 32px);margin:8px 16px 4px;padding:16px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius-lg);font-size:17px;font-weight:800;cursor:pointer;}
.admin-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:#1a1a1a;color:#fff;margin-left:6px;vertical-align:middle;}
.admin-bar{display:flex;align-items:center;gap:8px;padding:7px 14px;background:#1a1a1a;color:#fff;font-size:12px;flex-wrap:wrap;}
.admin-bar-msg{flex:1;font-size:11px;opacity:.8;}
.logout-btn{font-size:11px;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:transparent;color:#fff;cursor:pointer;}
.logout-btn:hover{background:rgba(255,255,255,.1);}
@media(max-width:480px){.menu-grid{grid-template-columns:1fr;}}
.wiz-screen{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.wiz-header{padding:14px 16px 10px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.wiz-back{width:40px;height:40px;border-radius:50%;border:none;background:var(--surface2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation;flex-shrink:0;color:var(--text);}
.wiz-back:active{transform:scale(.92);}
.wiz-header-info{flex:1;}
.wiz-title{font-size:17px;font-weight:800;}
.wiz-step-label{font-size:12px;color:var(--text2);margin-top:2px;}
.wiz-progress{height:4px;background:var(--border);}
.wiz-progress-bar{height:4px;background:var(--text);transition:width .3s ease;}
.wiz-body{flex:1;padding:24px 20px 16px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;}
.wiz-section-title{font-size:22px;font-weight:800;line-height:1.3;}
.wiz-tel-display{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;text-align:center;}
.wiz-tel-number{font-size:36px;font-weight:800;letter-spacing:.08em;color:var(--text);min-height:52px;display:flex;align-items:center;justify-content:center;}
.wiz-tel-number.empty{color:var(--border2);font-size:22px;font-weight:400;}
.wiz-tel-hint{font-size:12px;color:var(--text2);margin-top:6px;}
.wiz-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}

<script>

const FIREBASE_CONFIG={apiKey:"AIzaSyA5wKvTnqeZ0zug5Jgmwklw7hOlR91zZYc",authDomain:"kawaguchi-uketsuke.firebaseapp.com",databaseURL:"https://kawaguchi-uketsuke-default-rtdb.firebaseio.com",projectId:"kawaguchi-uketsuke",storageBucket:"kawaguchi-uketsuke.firebasestorage.app",messagingSenderId:"332721520087",appId:"1:332721520087:web:4130e818983bfeffb0df92"};
const FIREBASE_CONFIGURED=FIREBASE_CONFIG.apiKey!=="YOUR_API_KEY";
const SHAKAKU=['2t','4t','大型','コンテナ','軽'];
const TSUMI=['PL','バラ'];

// ===== 改修4: 入荷元・出荷先マスタ管理 =====
const SRC_STORAGE_KEY='kw_lotte_src_v1';
const SRC_DEFAULT=['狭山工場','狭山工場倉庫','浦和工場','第一倉庫','戸田','滋賀工場','九州工場','その他'];
function getLotteSrc(){
  try{var s=localStorage.getItem(SRC_STORAGE_KEY);if(s){var a=JSON.parse(s);if(Array.isArray(a)&&a.length>0)return a;}}catch(e){}
  return SRC_DEFAULT.slice();
}
function saveLotteSrc(arr){
  try{localStorage.setItem(SRC_STORAGE_KEY,JSON.stringify(arr));}catch(e){}
  // Firebaseにも保存（全デバイスに反映）
  if(fbDb){try{fbDb.ref('kawaguchi/lotteSrc').set(arr);}catch(e){}}
}
function addSrc(){
  var inp=document.getElementById('src-add-inp');if(!inp)return;
  var val=inp.value.trim();if(!val){alert('追加する名称を入力してください');return;}
  var arr=getLotteSrc();var wo=arr.filter(function(s){return s!=='その他';});
  if(wo.indexOf(val)>=0){alert('すでに登録されています');return;}
  wo.push(val);wo.push('その他');saveLotteSrc(wo);inp.value='';renderSrcManager();
}
function deleteSrc(name){
  if(name==='その他'){alert('「その他」は削除できません');return;}
  if(!confirm('「'+name+'」を削除しますか？\n登録済みデータには影響しません'))return;
  saveLotteSrc(getLotteSrc().filter(function(s){return s!==name;}));renderSrcManager();
}

  <div style="padding:12px 14px 80px;">

      ロッテ様受付の「入荷元・出荷先」リストを管理します。追加・削除は次回受付から反映されます。

      <div style="display:flex;gap:8px;">
        <input id="src-add-inp" type="text" placeholder="例: 新宿倉庫、横浜センターなど"
          style="flex:1;font-size:15px;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);"
          onkeydown="if(event.key==='Enter')addSrc()">
        <button onclick="addSrc()" style="padding:10px 16px;background:var(--text);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;">追加</button>

    ${arr.map(function(name){return '<div class="src-mgr-item"><div class="src-mgr-label">'+e(name)+'</div>'+(name==='その他'?'<span style="font-size:11px;color:var(--text3);">削除不可</span>':'<button class="src-mgr-del" onclick="deleteSrc(\''+name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')" >削除</button>')+'</div>';}).join('')}
  </div>`;

// ===== FIREBASE =====
let fbDb=null,syncStatus='offline';
function initFirebase(){
  if(!FIREBASE_CONFIGURED||typeof firebase==='undefined')return;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    firebase.auth().signInAnonymously().then(function(){
      fbDb=firebase.database();syncStatus='live';render();
      fbDb.ref('kawaguchi').on('value',function(snap){
        var data=snap.val();if(!data)return;
        if(data.db){S.db=data.db;ensureDay(S.db,todayKey());}
        if(data.drivers)S.drivers=data.drivers;
        if(data.lotteSrc&&Array.isArray(data.lotteSrc)&&data.lotteSrc.length>0){saveLotteSrc(data.lotteSrc);}
        if(!S.modal)render();
      });
    }).catch(function(err){console.error('Firebase auth error:',err);syncStatus='offline';render();});
  }catch(e){syncStatus='offline';}
}
function remoteSave(){if(!fbDb){localSave();return;}try{fbDb.ref('kawaguchi').set({db:S.db,drivers:S.drivers,lotteSrc:getLotteSrc()});}catch(e){localSave();}}
function localSave(){try{localStorage.setItem('kw_db_v5',JSON.stringify(S.db));localStorage.setItem('kw_dr_v5',JSON.stringify(S.drivers));}catch(e){}}
function save(){localSave();remoteSave();}
function loadLocal(){let db={},drivers=[];try{db=JSON.parse(localStorage.getItem('kw_db_v5')||'{}');}catch{}try{drivers=JSON.parse(localStorage.getItem('kw_dr_v5')||'[]');}catch{}return{db,drivers};}

// ===== HELPERS =====
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fmtKey(k){const[y,m,d]=k.split('-');const wd=['日','月','火','水','木','金','土'];const dt=new Date(+y,+m-1,+d);return `${y}年${m}月${d}日（${wd[dt.getDay()]}）`;}
function nowStr(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function nowFull(){const d=new Date();return `${d.getMonth()+1}/${d.getDate()} ${nowStr()}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function mkNRow(no){return{id:uid(),no,fuda:'',company:'',name:'',tel:'',car:'',shakaku:'2t',tsumi:'バラ',nyuuko:'',shukko:'',biko:'',deleted:false,editLog:[]};}
function mkLRow(no){return{id:uid(),no,company:'',name:'',tel:'',car:'',shakaku:'2t',order:'',type:'入荷',src:'狭山工場',srcOther:'',tochaku:'',basu:'',sakuEnd:'',shuppatsu:'',deleted:false,editLog:[]};}
function ensureDay(db,key){
  if(!db[key]){db[key]={nyuuka:Array.from({length:20},(_,i)=>mkNRow(i+1)),shukka:Array.from({length:20},(_,i)=>mkNRow(i+1)),lotte:Array.from({length:15},(_,i)=>mkLRow(i+1)),created:key};}
  ['nyuuka','shukka'].forEach(t=>{if(!db[key][t])db[key][t]=Array.from({length:20},(_,i)=>mkNRow(i+1));});
  if(!db[key].lotte)db[key].lotte=Array.from({length:15},(_,i)=>mkLRow(i+1));
  return db[key];
}

// ===== STATE =====
const{db:initDb,drivers:initDrivers}=loadLocal();
const DEFAULT_ADMIN_PASS="kawaguchi2024",SESSION_KEY="kw_admin_session",PIN_STORAGE_KEY="kw_delete_pin",ADMIN_PW_STORAGE_KEY="kw_admin_pw";
function getAdminPass(){return localStorage.getItem(ADMIN_PW_STORAGE_KEY)||DEFAULT_ADMIN_PASS;}
function getDeletePin(){return localStorage.getItem(PIN_STORAGE_KEY)||null;}

const WIZ={

// ===== STATUS LOGIC =====
function toMin(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function elapsed(t){if(!t)return null;const b=toMin(t);const n=new Date();return n.getHours()*60+n.getMinutes()-b;}
function timeOk(a,b){if(!a||!b)return true;return toMin(a)<=toMin(b);}
function rowStatus(r,type){
  if(r.deleted)return'deleted';
  if(type==='lotte'){
    const times=[r.tochaku,r.basu,r.sakuEnd,r.shuppatsu];const hasAny=times.some(Boolean)||r.company;if(!hasAny)return'empty';
    for(let i=1;i<times.length;i++){if(times[i-1]&&times[i]&&toMin(times[i-1])>toMin(times[i]))return'alert';}
    if(r.shuppatsu)return'done';
    if(r.tochaku){const el=elapsed(r.tochaku);if(el>=S.alertDanger)return'alert';if(el>=S.alertWarn)return'warn';}
    return hasAny?'active':'empty';
  }
  if(!r.company&&!r.nyuuko)return'empty';
  if(r.nyuuko&&r.shukko){if(!timeOk(r.nyuuko,r.shukko))return'alert';return'done';}
  if(r.nyuuko){const el=elapsed(r.nyuuko);if(el>=S.alertDanger)return'alert';if(el>=S.alertWarn)return'warn';}
  return r.company?'active':'empty';
}
function dotCls(st){return'dot dot-'+({empty:'empty',active:'active',warn:'warn',alert:'alert',done:'done',deleted:'del'}[st]||'empty');}
function rowCls(st){return({alert:'row-alert',warn:'row-warn',done:'row-ok',deleted:'row-deleted'}[st]||'');}
function findDriver(tel){const t=(tel||'').replace(/[-\s]/g,'');return S.drivers.find(d=>d.tel===t);}
function allDates(){return Object.keys(S.db).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort().reverse();}
function isToday(){return S.viewDate===todayKey();}
function canEdit(){return isToday()||S.editMode;}
function todayData(){return S.db[todayKey()];}
function viewed(){return S.db[S.viewDate]||ensureDay(S.db,S.viewDate);}

// ===== RENDER ENGINE =====
const root=document.getElementById('root');
const modalContainer=document.getElementById('modal-container');

function render(){
  modalContainer.innerHTML='';
  var appPin=getAppPin();
  if(!appPin){renderNoPin();return;}
  if(!isAppLoggedIn()){renderAppLogin('login');return;}
  if(WIZ.active){renderWizard();return;}
  if(S.modal){renderModal();return;}
  root.innerHTML='';
  const adminRequired=['drivers','history','export','srcmgr'];
  if(adminRequired.includes(S.screen)&&!isAdminLoggedIn()){renderAdminLogin(S.screen);return;}
  if(S.screen==='home')        renderHome();
  else if(S.screen==='nyuuka') renderTable('nyuuka');
  else if(S.screen==='shukka') renderTable('shukka');
  else if(S.screen==='lotte')  renderLotte();
  else if(S.screen==='drivers') renderDrivers();
  else if(S.screen==='history'){_historyDetailDate=null;renderHistory();}
  else if(S.screen==='export')  renderExport();
  else if(S.screen==='srcmgr')  renderSrcManager();
}

// ===== DATE NAV & MOD BAR =====
function dateNavHtml(label){
  const dates=allDates();
  const opts=dates.map(k=>`<option value="${k}"${k===S.viewDate?' selected':''}>${fmtKey(k)}${k===todayKey()?' 【本日】':''}</option>`).join('');
  const tagCls=isToday()?'today':S.editMode?'editing':'past';
  const tagLabel=isToday()?'本日':S.editMode?'修正モード':'閲覧中';
  return `<div class="date-nav"><select onchange="S.viewDate=this.value;S.editMode=false;render();">${opts}</select><span class="mode-tag ${tagCls}">${tagLabel}</span></div>`;
}
function modBarHtml(){
  if(isToday())return`<div class="mod-bar today"><span class="mod-bar-msg">✓ 本日のデータを編集中</span></div>`;
  if(S.editMode)return`<div class="mod-bar editing"><span class="mod-bar-msg">✎ 後日修正モード</span><button class="toggle-edit-btn" onclick="S.editMode=false;render();">修正を終了</button></div>`;
  return`<div class="mod-bar past"><span class="mod-bar-msg">閲覧のみ（読み取り専用）</span><button class="toggle-edit-btn" onclick="S.editMode=true;render();">後日修正を行う</button></div>`;
}

}

  const m=S.modal;let html='';

    const{id}=S.modalData;const day=S.db[S.viewDate];const r=day?.lotte?.find(x=>x.id===id);const cur=r?.srcOther||'';

      <div class="modal" style="max-width:360px;"><h3>入荷元 / 出荷先（その他）</h3>

function confirmRestore(type,id){const day=S.db[S.viewDate];const r=day[type].find(x=>x.id===id);if(!r)return;S.modal='confirmRestore';S.modalData={type,id,r};render();}
function confirmDelDriver(id,name){S.modal='confirmDelDriver';S.modalData={id,name};render();}
function doDelete(){const{type,id}=S.modalData;const r=S.db[S.viewDate][type].find(x=>x.id===id);if(r){r.deleted=true;if(!r.editLog)r.editLog=[];r.editLog.push(`${nowFull()} 削除`);save();}closeModal();}
function doRestore(){const{type,id}=S.modalData;const r=S.db[S.viewDate][type].find(x=>x.id===id);if(r){r.deleted=false;if(!r.editLog)r.editLog=[];r.editLog.push(`${nowFull()} 削除取消`);save();}closeModal();}
function doDelDriver(){S.drivers=S.drivers.filter(d=>d.id!==S.modalData.id);save();closeModal();go('drivers');}
let _updTimer={};
function upd(type,id,field,val){
  const day=S.db[S.viewDate];if(!day)return;
  const r=day[type].find(x=>x.id===id);if(!r||r.deleted)return;
  const old=r[field];r[field]=val;
  if(!isToday()&&old!==val&&old!==undefined&&old!==''){if(!r.editLog)r.editLog=[];r.editLog.push(`${nowFull()} ${field}「${old||'空'}」→「${val}」`);}
  const key=`${type}-${id}-${field}`;clearTimeout(_updTimer[key]);_updTimer[key]=setTimeout(()=>save(),600);
}
function stamp(type,id,field){if(!isToday())return;const r=todayData()[type].find(x=>x.id===id);if(!r||r.deleted)return;r[field]=nowStr();save();render();}

let _telState={type:'',id:'',buf:''};
function openTelModal(type,id){
  const day=S.db[S.viewDate];const r=day[type].find(x=>x.id===id);if(!r)return;
  _telState={type,id,buf:(r.tel||'').replace(/[-\s]/g,'')};renderTelModal();
}
function renderTelModal(){
  const{type,id,buf}=_telState;const day=S.db[S.viewDate];const r=day[type].find(x=>x.id===id);if(!r)return;
  const company=r.company||'',name=r.name||'',car=r.car||'',shakaku=r.shakaku||'2t';
  const driver=buf.length>=10?findDriver(buf):null;
  const dispBuf=buf.length>0?buf.replace(/^(\d{3})(\d{4})(\d{0,4})$/,'$1-$2-$3').replace(/-$/,''):'';
  const resultHtml=buf.length>=10?(driver?
    `<div class="tel-lookup-result found"><div class="tel-lookup-name">✓ ${driver.name}</div><div class="tel-lookup-sub">${driver.company||''} ／ 車番:${driver.car||'―'} ／ ${driver.shakaku}</div></div>`:
    `<div class="tel-lookup-result notfound"><div style="font-size:14px;font-weight:600;">新規ドライバー</div><div class="tel-lookup-sub">DBに登録がありません。下欄に会社名・氏名を入力してください。</div></div>`):'';
  const showFields=buf.length>=10;
  const keyLabels=[['1',''],['2','ABC'],['3','DEF'],['4','GHI'],['5','JKL'],['6','MNO'],['7','PQRS'],['8','TUV'],['9','WXYZ']];
  const keysHtml=keyLabels.map(([n,s])=>`<button class="tel-key" onclick="telKeyPress('${n}')">${n}<span class="tel-key-sub">${s}</span></button>`).join('');
  const ex=document.getElementById('tel-modal-overlay');if(ex)ex.remove();
  const div=document.createElement('div');div.id='tel-modal-overlay';div.className='tel-modal-overlay';
  div.innerHTML=`<div class="tel-modal">
    <div class="tel-modal-header"><div class="tel-modal-title">電話番号を入力</div><button class="tel-modal-close" onclick="closeTelModal()">✕</button></div>
    <div class="tel-display ${buf.length===0?'placeholder':''}">${buf.length===0?'090-0000-0000':dispBuf}</div>
    ${resultHtml}
    <div class="tel-keypad">${keysHtml}<button class="tel-key" style="visibility:hidden;"></button><button class="tel-key" onclick="telKeyPress('0')">0</button><button class="tel-key tel-del" onclick="telKeyDel()">⌫</button></div>
    <div class="tel-fields ${showFields?'show':''}" id="tel-fields">
      <div style="font-size:12px;color:var(--text2);padding:4px 0 8px;font-weight:600;">確認・修正してください</div>
      <div class="tel-field-row"><div class="tel-field-label">運送会社名</div><input class="tel-field-val" id="tf-company" type="text" value="${company}" placeholder="（株）〇〇運輸"></div>
      <div class="tel-field-row"><div class="tel-field-label">氏名</div><input class="tel-field-val" id="tf-name" type="text" value="${name}" placeholder="山田 太郎"></div>
      <div class="tel-field-row"><div class="tel-field-label">車番</div><input class="tel-field-val" id="tf-car" type="text" value="${car}" placeholder="1234"></div>
      <div class="tel-field-row"><div class="tel-field-label">車格</div><select class="tel-field-val" id="tf-shakaku">${['2t','4t','大型','コンテナ','軽'].map(s=>`<option${shakaku===s?' selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <button class="tel-confirm-btn" ${buf.length<10?'disabled style="opacity:.4;"':''} onclick="if(!this.disabled){this.disabled=true;confirmTelInput()}">
      ${buf.length<10?'電話番号を入力してください':'確定して受付に反映'}
    </button>
    <div style="height:8px;"></div>
  </div>`;
  document.body.appendChild(div);
}
function telKeyPress(n){if(_telState.buf.length>=11)return;_telState.buf+=n;renderTelModal();}
function telKeyDel(){_telState.buf=_telState.buf.slice(0,-1);renderTelModal();}
function closeTelModal(){const el=document.getElementById('tel-modal-overlay');if(el)el.remove();}
function confirmTelInput(){
  const{type,id,buf}=_telState;if(buf.length<10)return;
  const day=S.db[S.viewDate];const r=day[type].find(x=>x.id===id);if(!r)return;
  r.tel=buf;
  const company=document.getElementById('tf-company')?.value?.trim()||'';
  const name=document.getElementById('tf-name')?.value?.trim()||'';
  const car=document.getElementById('tf-car')?.value?.trim()||'';
  const shakaku=document.getElementById('tf-shakaku')?.value||'2t';
  if(company)r.company=company;if(name)r.name=name;if(car)r.car=car;r.shakaku=shakaku;

function lotSrc(id,val){
  upd('lotte',id,'src',val);
  if(val==='その他'){S.modal='srcOther';S.modalData={id};render();}else{render();}
}
// 複数入荷元/出荷先のテキスト直接編集
function updMultiSrc(id,val){
  const day=S.db[S.viewDate];if(!day)return;
  const r=day.lotte.find(x=>x.id===id);if(!r||r.deleted)return;
  const old=r.srcOther;
  r.srcOther=val.trim();
  if(!isToday()&&old!==r.srcOther){
    if(!r.editLog)r.editLog=[];
    r.editLog.push(nowFull()+' 入荷元/出荷先「'+(old||'空')+'」→「'+r.srcOther+'」');
  }
  save();
  // renderは呼ばない（フォーカスが外れたタイミングなので再描画不要）
}
function addRows(type){
  if(!isToday())return;const day=todayData();const base=day[type].length;
  for(let i=0;i<5;i++)day[type].push(type==='lotte'?mkLRow(base+i+1):mkNRow(base+i+1));
  save();render();
}
function submitModal(type){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  if(type==='driver'){
    const name=g('m-name'),tel=g('m-tel').replace(/[-\s]/g,'');
    if(!name||!tel){alert('氏名と電話番号は必須です');return;}
    S.drivers.push({id:uid(),company:g('m-company'),name,tel,car:g('m-car'),shakaku:g('m-shakaku')||'2t'});
    save();closeModal();return;
  }
  const company=g('m-company');if(!company){alert('運送会社名は必須です');return;}
  const tel=g('m-tel').replace(/[-\s]/g,'');
  const day=todayData();const arr=day[type];
  const slot=arr.find(r=>!r.company&&!r.deleted&&(type==='lotte'?!r.tochaku:!r.nyuuko));
  const r=slot||(type==='lotte'?mkLRow(arr.length+1):mkNRow(arr.length+1));
  r.company=company;r.name=g('m-name');r.tel=tel;r.car=g('m-car');r.shakaku=g('m-shakaku')||'2t';
  if(type==='lotte'){r.order=g('m-order');r.type=g('m-type')||'入荷';const src=g('m-src');r.src=src;r.srcOther=src==='その他'?g('m-src-other'):'';r.tochaku=nowStr();}
  else{r.tsumi=g('m-tsumi')||'バラ';r.fuda=g('m-fuda');r.biko=g('m-biko');r.nyuuko=nowStr();}
  if(!slot)arr.push(r);save();S.modal=null;S.viewDate=todayKey();S.screen=type;render();
}

let _pinBuffer='';
function pinPress(n){if(_pinBuffer.length>=4)return;_pinBuffer+=String(n);updatePinDisplay();if(_pinBuffer.length===4)setTimeout(()=>checkPin(),120);}
function pinDel(){_pinBuffer=_pinBuffer.slice(0,-1);updatePinDisplay();const errEl=document.getElementById('pin-err');if(errEl)errEl.textContent='';for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d)d.classList.remove('err');}}

function checkPin(){const pin=getDeletePin();if(_pinBuffer===pin){doDelete();}else{for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d){d.classList.remove('filled');d.classList.add('err');}}const errEl=document.getElementById('pin-err');if(errEl)errEl.textContent='PINが違います。もう一度入力してください。';setTimeout(()=>{_pinBuffer='';for(let i=0;i<4;i++){const d=document.getElementById('pd'+i);if(d){d.classList.remove('err');d.classList.remove('filled');}}if(errEl)errEl.textContent='';},1200);}}

function saveNewPin(){const el=document.getElementById('new-pin-input');const val=(el?.value||'').replace(/\D/g,'');if(val.length!==4){document.getElementById('pin-save-msg').textContent='4桁の数字で入力してください';document.getElementById('pin-save-msg').style.color='var(--red)';return;}setDeletePin(val);el.value='';document.getElementById('pin-status-label').textContent='設定済み（●●●●）';document.getElementById('pin-save-msg').textContent='PINを設定しました';document.getElementById('pin-save-msg').style.color='var(--green)';setTimeout(()=>{const m=document.getElementById('pin-save-msg');if(m)m.textContent='';},2000);}
function clearPin(){if(!confirm('PINを削除します。削除時の認証が不要になります。よろしいですか？'))return;setDeletePin(null);document.getElementById('pin-status-label').textContent='未設定';document.getElementById('pin-save-msg').textContent='PINを削除しました';document.getElementById('pin-save-msg').style.color='var(--amber)';setTimeout(()=>{const m=document.getElementById('pin-save-msg');if(m)m.textContent='';},2000);}

const APP_PIN_KEY='kw_app_pin',APP_LOGIN_KEY='kw_app_login_until',APP_PIN_VALID_DAYS=30;
function getAppPin(){return localStorage.getItem(APP_PIN_KEY)||null;}
function setAppPin(pin){if(pin)localStorage.setItem(APP_PIN_KEY,pin);else localStorage.removeItem(APP_PIN_KEY);}
function isAppLoggedIn(){var until=parseInt(localStorage.getItem(APP_LOGIN_KEY)||'0');return until>Date.now();}
function markAppLoggedIn(){localStorage.setItem(APP_LOGIN_KEY,String(Date.now()+APP_PIN_VALID_DAYS*24*60*60*1000));}
function clearAppLogin(){localStorage.removeItem(APP_LOGIN_KEY);}
function appLogout(){if(!confirm('ログアウトしますか？\n次回アクセス時にPINの再入力が必要になります。'))return;clearAppLogin();render();}
function changeAdminPass(){
  var old=document.getElementById('admin-pw-old')?.value||'';
  var nw1=document.getElementById('admin-pw-new1')?.value||'';
  var nw2=document.getElementById('admin-pw-new2')?.value||'';

  if(old!==getAdminPass()){setMsg('現在のパスワードが違います');return;}
  if(nw1.length<6){setMsg('新しいパスワードは6文字以上にしてください');return;}
  if(nw1!==nw2){setMsg('新しいパスワードが一致しません');return;}
  localStorage.setItem('kw_admin_pw',nw1);
  setMsg('✓ 管理者パスワードを変更しました','var(--green)');

}

function renderAppLoginUi(){
  var title,sub;
  if(_appLoginMode==='setup'){title=_appLoginStep===1?'アプリPINを設定':'PINの確認';sub=_appLoginStep===1?'スタッフ全員が使う4桁PINを設定してください':'もう一度同じPINを入力してください';}
  else if(_appLoginMode==='change'){title=_appLoginStep===1?'新しいPINを設定':'新しいPINの確認';sub=_appLoginStep===1?'4桁の新しいPINを入力してください':'もう一度同じPINを入力してください';}

  var dotsHtml='';for(var i=0;i<4;i++){dotsHtml+='<div class="pin-dot'+(i<_appLoginBuf.length?' filled':'')+'" id="apd'+i+'"></div>';}
  var keysHtml='';for(var n=1;n<=9;n++){keysHtml+='<button class="pin-key" onclick="appPinPress('+n+')">'+n+'</button>';}
  keysHtml+='<div></div><button class="pin-key" onclick="appPinPress(0)">0</button><button class="pin-key pin-del-key" onclick="appPinDel()">⌫</button>';
  var forgotLink=(_appLoginMode==='login')?'<div style="text-align:center;margin-top:12px;"><button onclick="renderForgotPin()" style="font-size:12px;color:var(--text2);background:none;border:none;cursor:pointer;text-decoration:underline;">PINを忘れた場合はこちら</button></div>':'';
  var cancelBtn=(_appLoginMode==='change')?'<div style="text-align:center;margin-top:12px;"><button onclick="go(\x27home\x27)" style="font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer;">キャンセル</button></div>':'';

    +'<div class="pin-sub">'+sub+'</div>'
    +'<div class="pin-display">'+dotsHtml+'</div>'
    +'<div class="pin-pad">'+keysHtml+'</div>'
    +'<div class="pin-err" id="app-pin-err"></div>'+forgotLink+cancelBtn+'</div></div>';
}

function appPinPress(n){
  if(_appLoginBuf.length>=4)return;_appLoginBuf+=String(n);
  for(var i=0;i<4;i++){var d=document.getElementById('apd'+i);if(d)d.classList.toggle('filled',i<_appLoginBuf.length);}
  if(_appLoginBuf.length===4)setTimeout(appPinCheck,120);
}
function appPinDel(){
  _appLoginBuf=_appLoginBuf.slice(0,-1);
  for(var i=0;i<4;i++){var d=document.getElementById('apd'+i);if(d)d.classList.toggle('filled',i<_appLoginBuf.length);}
  var errEl=document.getElementById('app-pin-err');if(errEl)errEl.textContent='';
}
function appPinCheck(){
  var err=document.getElementById('app-pin-err');
  if(_appLoginMode==='login'){
    if(_appLoginBuf===getAppPin()){markAppLoggedIn();render();}
    else{if(err)err.textContent='PINが違います';pinFlashError();}
  }else{
    if(_appLoginStep===1){_appLoginNewPin=_appLoginBuf;_appLoginBuf='';_appLoginStep=2;renderAppLoginUi();}
    else{
      if(_appLoginBuf===_appLoginNewPin){
        setAppPin(_appLoginNewPin);markAppLoggedIn();
        var msg=_appLoginMode==='change'?'PINを変更しました。\n全端末で次回アクセス時に再入力が必要になります。':'PINを設定しました。';
        alert(msg);render();
      }else{if(err)err.textContent='PINが一致しません。最初からやり直してください';pinFlashError();setTimeout(function(){_appLoginBuf='';_appLoginStep=1;_appLoginNewPin='';renderAppLoginUi();},1500);}
    }
  }

function closeSrcOther(id){

function handleTimeInput(type,id,field,val){
  if(!val){updField(type,id,field,'');return;}
  var cleaned=val.replace(/[^0-9]/g,'');
  if(cleaned.length===3)cleaned='0'+cleaned;
  if(cleaned.length===4){var h=parseInt(cleaned.slice(0,2));var m=parseInt(cleaned.slice(2,4));if(h>=0&&h<=23&&m>=0&&m<=59){updField(type,id,field,String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'));return;}}
  var m2=val.match(/^(\d{1,2}):(\d{2})$/);
  if(m2){var h2=parseInt(m2[1]),mn2=parseInt(m2[2]);if(h2>=0&&h2<=23&&mn2>=0&&mn2<=59){updField(type,id,field,String(h2).padStart(2,'0')+':'+String(mn2).padStart(2,'0'));return;}}
  updField(type,id,field,val);
}
function updField(type,id,field,val){
  var day=S.db[S.viewDate];if(!day)return;
  var r=day[type].find(function(x){return x.id===id;});if(!r||r.deleted)return;
  var old=r[field];r[field]=val;
  if(!isToday()&&old!==val&&old!==undefined&&old!==''){if(!r.editLog)r.editLog=[];r.editLog.push(nowFull()+' '+field+'「'+(old||'空')+'」→「'+val+'」');}
  save();
}

      <div class="wiz-confirm-row"><div class="wiz-confirm-label">お名前</div><div class="wiz-confirm-val">${e(WIZ.name||'―')}</div></div>
      <div class="wiz-confirm-row"><div class="wiz-confirm-label">車番</div><div class="wiz-confirm-val">${e(WIZ.car||'―')}</div></div>
      <div class="wiz-confirm-row"><div class="wiz-confirm-label">車格</div><div class="wiz-confirm-val">${WIZ.shakaku}</div></div>
      ${WIZ.type==='lotte'?`
      <div class="wiz-confirm-row"><div class="wiz-confirm-label">入荷/出荷</div><div class="wiz-confirm-val">${WIZ.nyukaType}</div></div>
      ${hasNyukaType('入荷')?`<div class="wiz-confirm-row"><div class="wiz-confirm-label">入荷元</div><div class="wiz-confirm-val" style="font-size:14px;">${WIZ.srcInRows.filter(r=>r.val).map(r=>e(r.val==='その他'?(r.other||'その他'):r.val)).join('，')||'―'}</div></div>`:''}
      ${hasNyukaType('出荷')?`<div class="wiz-confirm-row"><div class="wiz-confirm-label">出荷先</div><div class="wiz-confirm-val" style="font-size:14px;">${WIZ.srcRows.filter(r=>r.val).map(r=>e(r.val==='その他'?(r.other||'その他'):r.val)).join('，')||'―'}</div></div>`:''}
      ${hasNyukaType('入荷')&&hasNyukaType('出荷')?`<div class="wiz-confirm-row"><div class="wiz-confirm-label">オーダーNo</div><div class="wiz-confirm-val" style="font-size:12px;">入荷:${e(WIZ.orderIn||'―')} ／ 出荷:${e(WIZ.orderOut||'―')}</div></div>`:`<div class="wiz-confirm-row"><div class="wiz-confirm-label">オーダーNo</div><div class="wiz-confirm-val">${e(WIZ.order||'―')}</div></div>`}
      <div class="wiz-confirm-row"><div class="wiz-confirm-label">積み方</div><div class="wiz-confirm-val">${WIZ.tsumi||''}</div></div>
      `:`<div class="wiz-confirm-row"><div class="wiz-confirm-label">積み方</div><div class="wiz-confirm-val">${WIZ.tsumi||'バラ'}</div></div>`}
    </div>
    <div style="background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--radius-lg);padding:14px 16px;font-size:14px;color:var(--green);font-weight:600;line-height:1.7;">
      ${WIZ.type==='lotte'?'「受付完了 ＋ 到着打刻」を押すと現在時刻で到着時間が登録されます。':'「受付完了 ＋ 入庫打刻」を押すと現在時刻で入庫時間が登録されます。'}
    </div>`;
  }

  root.innerHTML=`<div class="wiz-screen">
    <div class="wiz-header">
      <button class="wiz-back" onclick="wizBack()">←</button>
      <div class="wiz-header-info"><div class="wiz-title">${label} 受付</div><div class="wiz-step-label">${stepLabels[WIZ.step]||''}</div></div>
    </div>
    <div class="wiz-progress"><div class="wiz-progress-bar" style="width:${prog}%;"></div></div>
    <div class="wiz-body">${body}</div>
    <div class="wiz-footer">
      ${isStampStep
        ?`<button class="wiz-next-btn stamp" id="wiz-complete-btn" onclick="wizComplete()">${WIZ.type==='lotte'?'受付完了 ＋ 到着打刻':'受付完了 ＋ 入庫打刻'}</button>`
        :`<button class="wiz-next-btn" ${nextDisabled?'disabled':''} onclick="if(!this.disabled){this.disabled=true;wizNext()}">${nextLabel}</button>`
      }
    </div>
  </div>`;
}

function wizTelKey(n){if(WIZ.tel.length>=11)return;WIZ.tel+=n;renderWizard();}
function wizTelDel(){WIZ.tel=WIZ.tel.slice(0,-1);renderWizard();}

function wizNext(){
  const flow=wizFlow();const idx=flow.indexOf(WIZ.step);
  if(WIZ.step==='lotte_info'){
    var _hN=hasNyukaType('入荷'),_hS=hasNyukaType('出荷');
    if(_hN&&_hS){var oin=document.getElementById('wiz-order-in');var oout=document.getElementById('wiz-order-out');if(oin)WIZ.orderIn=oin.value.trim();if(oout)WIZ.orderOut=oout.value.trim();if(!WIZ.orderIn&&!WIZ.orderOut){alert('オーダーNoを入力してください');return;}}
    else{var ordInp=document.getElementById('wiz-order');if(ordInp)WIZ.order=ordInp.value.trim();}
    WIZ.step=flow[idx+1];
  }else if(WIZ.step==='tel'){
    const d=findDriver(WIZ.tel);
    if(d){WIZ.driver=d;WIZ.isNew=false;WIZ.company=d.company||'';WIZ.name=d.name||'';WIZ.car=d.car||'';WIZ.shakaku=d.shakaku||'';WIZ.tsumi=d.tsumi||'';WIZ.step='confirm_existing';}
    else{WIZ.driver=null;WIZ.isNew=true;WIZ.step='name';}
  }else if(WIZ.step==='confirm_existing'){
    const c=document.getElementById('wiz-company');const n=document.getElementById('wiz-name');const car=document.getElementById('wiz-car');const sh=document.getElementById('wiz-shakaku');
    if(c)WIZ.company=c.value.trim();if(n)WIZ.name=n.value.trim();if(car)WIZ.car=car.value.trim();if(sh)WIZ.shakaku=sh.value;
    WIZ.step=flow[idx+1];
  }else if(WIZ.step==='name'){
    const c=document.getElementById('wiz-company');const n=document.getElementById('wiz-name');
    if(c)WIZ.company=c.value.trim();if(n)WIZ.name=n.value.trim();WIZ.step='car';
  }else if(WIZ.step==='car'){
    const car=document.getElementById('wiz-car');const sh=document.getElementById('wiz-shakaku');const fd=document.getElementById('wiz-fuda');
    if(car)WIZ.car=car.value.trim();if(sh)WIZ.shakaku=sh.value;if(fd)WIZ.fuda=fd.value;WIZ.step=flow[idx+1];
  }else if(WIZ.step==='consent'){WIZ.step='final';}
  renderWizard();
}

function wizComplete(){
  // 多重実行防止: ボタンを即座に無効化
  var btn=document.getElementById('wiz-complete-btn');
  if(btn){
    if(btn.disabled)return; // 既に処理中なら無視
    btn.disabled=true;
    btn.textContent='登録中...';
  }
  const day=todayData();const arr=day[WIZ.type];
  if(WIZ.type==='lotte'){
    // 入荷/出荷 × 入荷元/出荷先複数 → タイプごとに1行、入荷元はカンマ区切りでまとめる
    var types=WIZ.nyukaType?WIZ.nyukaType.split(',').filter(function(x){return x;}):[''];
    var nowT=nowStr();
    types.forEach(function(typ){
      var rows=(typ==='入荷')?WIZ.srcInRows:WIZ.srcRows;
      var validRows=rows.filter(function(row){return row.val;});
      // 複数の入荷元/出荷先をカンマ区切りの文字列にまとめる
      var srcJoined=validRows.map(function(row){
        return row.val==='その他'?(row.other||'その他'):row.val;
      }).join('，'); // 全角カンマで区切り（CSV出力と区別するため）
      var slot=arr.find(function(r){return !r.company&&!r.tochaku&&!r.deleted;});
      var r=slot||mkLRow(arr.length+1);
      r.tel=WIZ.tel;r.company=WIZ.company;r.name=WIZ.name;r.car=WIZ.car;r.shakaku=WIZ.shakaku;r.tsumi=WIZ.tsumi||'';
      r.order=(typ==='入荷'?WIZ.orderIn:WIZ.orderOut)||WIZ.order||'';
      r.type=typ;
      r.src=validRows.length>0?'複数':( srcJoined||'');
      r.srcOther=srcJoined; // カンマ区切りの全拠点をsrcOtherに保存
      r.tochaku=nowT;r.basu='';r.sakuEnd='';r.shuppatsu='';
      if(!slot)arr.push(r);
    });
  }else{
    const slot=arr.find(r=>!r.company&&!r.nyuuko&&!r.deleted);
    const r=slot||mkNRow(arr.length+1);
    r.tel=WIZ.tel;r.company=WIZ.company;r.name=WIZ.name;r.car=WIZ.car;r.shakaku=WIZ.shakaku||'';r.tsumi=WIZ.tsumi||'';r.fuda=WIZ.fuda||'';r.nyuuko=nowStr();
    if(!slot)arr.push(r);
  }
  if(WIZ.isNew&&WIZ.consent&&WIZ.tel&&WIZ.name){S.drivers.push({id:uid(),company:WIZ.company,name:WIZ.name,tel:WIZ.tel,car:WIZ.car,shakaku:WIZ.shakaku,tsumi:WIZ.tsumi||''});}
  if(WIZ.driver){const idx=S.drivers.findIndex(d=>d.tel===WIZ.tel);if(idx>=0)S.drivers[idx]={...S.drivers[idx],company:WIZ.company,name:WIZ.name,car:WIZ.car,shakaku:WIZ.shakaku,tsumi:WIZ.tsumi||''};}
  save();WIZ.active=false;S.viewDate=todayKey();S.screen=WIZ.type;render();
}

// ===== TIME INPUT MODAL =====
var _TM={type:'',id:'',field:'',buf:''};
var _TM_LABELS={nyuuko:'入庫時間',shukko:'出庫時間',tochaku:'到着時間',basu:'バース着車',sakuEnd:'作業終了',shuppatsu:'出発時間'};
function openTimeModal(type,id,field,cur){_TM={type:type,id:id,field:field,buf:''};if(cur&&/^\d{2}:\d{2}$/.test(cur))_TM.buf=cur.replace(':','');renderTimeModal();}
function renderTimeModal(){
  var old=document.getElementById('_tm_overlay');if(old)old.remove();
  var buf=_TM.buf,dh=buf.length>=2?buf.slice(0,2):(buf.length===1?buf+'_':'--'),dm=buf.length>=4?buf.slice(2,4):(buf.length===3?buf.slice(2)+'_':'--');
  var valid=buf.length===4,hint=buf.length<2?'時（00〜23）を入力':buf.length<4?'分（00〜59）を入力':'OKを押して確定';
  var ov=document.createElement('div');ov.id='_tm_overlay';ov.className='time-modal-overlay';
  var md=document.createElement('div');md.className='time-modal';
  var hdr=document.createElement('div');hdr.className='time-modal-hdr';
  var ttl=document.createElement('div');ttl.className='time-modal-title';ttl.textContent=_TM_LABELS[_TM.field]||'時刻入力';
  var cls=document.createElement('button');cls.className='time-modal-close';cls.textContent='✕';cls.onclick=function(){ov.remove();};
  hdr.appendChild(ttl);hdr.appendChild(cls);md.appendChild(hdr);
  var dw=document.createElement('div');dw.className='time-disp-wrap';
  var dp=document.createElement('div');dp.className='time-disp'+(buf.length===0?' empty':'');
  dp.innerHTML=buf.length===0?'--:--':'<span>'+dh+'</span><span style="margin:0 4px;">:</span><span>'+dm+'</span>';
  var ht=document.createElement('div');ht.className='time-hint';ht.textContent=hint;
  dw.appendChild(dp);dw.appendChild(ht);md.appendChild(dw);
  var kp=document.createElement('div');kp.className='time-keypad';
  [1,2,3,4,5,6,7,8,9].forEach(function(n){var b=document.createElement('button');b.className='time-key';b.textContent=n;b.onclick=function(){tmKey(String(n));};kp.appendChild(b);});
  var sp=document.createElement('button');sp.style.visibility='hidden';kp.appendChild(sp);
  var z=document.createElement('button');z.className='time-key';z.textContent='0';z.onclick=function(){tmKey('0');};kp.appendChild(z);
  var dl=document.createElement('button');dl.className='time-key time-del';dl.textContent='⌫';dl.onclick=function(){tmDel();};kp.appendChild(dl);
  md.appendChild(kp);
  var nb=document.createElement('button');nb.className='time-now-btn';nb.textContent='現在時刻を使用（'+nowStr()+'）';nb.onclick=function(){_TM.buf=nowStr().replace(':','');tmConfirm();};md.appendChild(nb);
  var ok=document.createElement('button');ok.className='time-ok-btn';ok.textContent=valid?'確定（'+dh+':'+dm+'）':'時刻を入力してください';if(!valid)ok.disabled=true;ok.onclick=function(){if(valid)tmConfirm();};md.appendChild(ok);
  var sp2=document.createElement('div');sp2.style.height='8px';md.appendChild(sp2);
  ov.appendChild(md);document.body.appendChild(ov);
}
function tmKey(n){var buf=_TM.buf;if(buf.length>=4)return;var next=buf+n;if(next.length===1&&+n>2)return;if(next.length===2&&+next>23)return;if(next.length===3&&+n>5)return;_TM.buf=next;renderTimeModal();}
function tmDel(){_TM.buf=_TM.buf.slice(0,-1);renderTimeModal();}
function tmConfirm(){
  var buf=_TM.buf;if(buf.length!==4)return;var ts=buf.slice(0,2)+':'+buf.slice(2,4);
  var day=S.db[S.viewDate];if(!day)return;var arr=day[_TM.type];if(!arr)return;
  var r=arr.find(function(x){return x.id===_TM.id;});
  if(r){var old=r[_TM.field];r[_TM.field]=ts;if(!isToday()&&old!==ts){if(!r.editLog)r.editLog=[];r.editLog.push(nowFull()+' '+_TM.field+'「'+(old||'空')+'」→「'+ts+'」');}save();}
  var ov=document.getElementById('_tm_overlay');if(ov)ov.remove();render();
}

// ===== CSV EXPORT =====
function getExpDate(){return document.getElementById('exp-date')?.value||todayKey();}
function csvCell(v){if(v===null||v===undefined)return'';var s=String(v);if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0){return'"'+s.replace(/"/g,'""')+'"';}return s;}
function csvTel(tel){if(!tel)return'';return'="'+String(tel).replace(/"/g,'""')+'"';}
function toCsvNS(arr,dateKey){
  const h='日付,No,番号札,会社名,氏名,電話番号,車番,車格,積み方,メーカー名,入庫時間,出庫時間,修正記録';const d=dateKey||'';
  const rows=arr.filter(r=>r.company&&!r.deleted).map(r=>[csvCell(d),r.no,csvCell(r.fuda||''),csvCell(r.company),csvCell(r.name||''),csvTel(r.tel),csvCell(r.car||''),csvCell(r.shakaku),csvCell(r.tsumi),csvCell(r.nyuuko||''),csvCell(r.shukko||''),csvCell(r.biko||''),csvCell((r.editLog&&r.editLog.length?r.editLog.join('|'):'')),].join(','));
  return h+'\n'+rows.join('\n');
}
function toCsvL(arr,dateKey){
  const h='日付,No,会社名,氏名,電話番号,車番,車格,オーダーNo,入荷出荷,入荷元,到着時間,バース着車,作業終了,出発時間,修正記録';const d=dateKey||'';
  const rows=arr.filter(r=>r.company&&!r.deleted).map(r=>[csvCell(d),r.no,csvCell(r.company),csvCell(r.name||''),csvTel(r.tel),csvCell(r.car||''),csvCell(r.shakaku),csvCell(r.order||''),csvCell(r.type),csvCell(r.src==='その他'||r.src==='複数'?r.srcOther:r.src),csvCell(r.tochaku||''),csvCell(r.basu||''),csvCell(r.sakuEnd||''),csvCell(r.shuppatsu||''),csvCell((r.editLog&&r.editLog.length?r.editLog.join('|'):'')),].join(','));
  return h+'\n'+rows.join('\n');
}
function dlCsv(type){const dk=getExpDate();const day=S.db[dk];if(!day)return;const content=type==='lotte'?toCsvL(day.lotte,dk):toCsvNS(day[type],dk);const label=type==='nyuuka'?'入荷受付':type==='shukka'?'出荷受付':'ロッテ受付';_dl(`${label}_${dk}.csv`,content);}
function dlAllCsv(){
  const dates=allDates().reverse();const h='日付,No,番号札,会社名,氏名,電話番号,車番,車格,積み方,メーカー名,入庫時間,出庫時間,修正記録';
  const rows=dates.flatMap(k=>{const d=S.db[k];return d?d.nyuuka.filter(r=>r.company&&!r.deleted).map(r=>[csvCell(k),r.no,csvCell(r.fuda||''),csvCell(r.company),csvCell(r.name||''),csvTel(r.tel),csvCell(r.car||''),csvCell(r.shakaku),csvCell(r.tsumi),csvCell(r.biko||''),csvCell(r.nyuuko||''),csvCell(r.shukko||''),csvCell((r.editLog&&r.editLog.length?r.editLog.join('|'):'')),].join(',')):[];});
  _dl('入荷受付_全期間.csv',h+'\n'+rows.join('\n'));
}
function dlMonthCsv(type){
  var monthSel=document.getElementById('exp-month');var ym=monthSel?monthSel.value:'';if(!ym){alert('月を選択してください');return;}
  var dates=allDates().filter(function(k){return k.startsWith(ym);}).sort();if(dates.length===0){alert('選択した月のデータがありません');return;}
  var header,rows=[];
  if(type==='lotte'){
    header='日付,No,会社名,氏名,電話番号,車番,車格,オーダーNo,入荷出荷,入荷元,到着時間,バース着車,作業終了,出発時間,修正記録';
    dates.forEach(function(k){var d=S.db[k];if(!d)return;d.lotte.filter(function(r){return r.company&&!r.deleted;}).forEach(function(r){rows.push([csvCell(k),r.no,csvCell(r.company),csvCell(r.name||''),csvTel(r.tel),csvCell(r.car||''),csvCell(r.shakaku),csvCell(r.order||''),csvCell(r.type),csvCell(r.src==='その他'||r.src==='複数'?r.srcOther:r.src),csvCell(r.tochaku||''),csvCell(r.basu||''),csvCell(r.sakuEnd||''),csvCell(r.shuppatsu||''),csvCell((r.editLog&&r.editLog.length?r.editLog.join('|'):'')),].join(','));});});
  }else{
    header='日付,No,番号札,会社名,氏名,電話番号,車番,車格,積み方,メーカー名,入庫時間,出庫時間,修正記録';
    dates.forEach(function(k){var d=S.db[k];if(!d)return;d[type].filter(function(r){return r.company&&!r.deleted;}).forEach(function(r){rows.push([csvCell(k),r.no,csvCell(r.fuda||''),csvCell(r.company),csvCell(r.name||''),csvTel(r.tel),csvCell(r.car||''),csvCell(r.shakaku),csvCell(r.tsumi),csvCell(r.biko||''),csvCell(r.nyuuko||''),csvCell(r.shukko||''),csvCell((r.editLog&&r.editLog.length?r.editLog.join('|'):'')),].join(','));});});
  }
  if(rows.length===0){alert('該当するデータがありません');return;}
  var label=type==='nyuuka'?'入荷受付':type==='shukka'?'出荷受付':'ロッテ受付';
  _dl(label+'_'+ym+'.csv',header+'\n'+rows.join('\n'));
}
function getAllMonths(){var months={};allDates().forEach(function(k){months[k.substring(0,7)]=true;});return Object.keys(months).sort().reverse();}
function _dl(fname,content){const blob=new Blob(['\uFEFF'+content],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();}
function printDay(){
  const dk=getExpDate();const day=S.db[dk];if(!day)return;
  const win=window.open('','_blank','width=950,height=750');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>入荷受付表 ${dk}</title>
  <style>body{font-family:'Hiragino Sans',sans-serif;font-size:11px;margin:16px;}h2{font-size:15px;margin-bottom:8px;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #999;padding:4px 6px;text-align:left;}th{background:#eee;font-size:10px;}@media print{button{display:none;}}</style></head><body>`);
  win.document.write(`<h2>入荷受付表　${fmtKey(dk)}</h2><table><tr><th>No</th><th>会社名</th><th>氏名</th><th>電話</th><th>車番</th><th>車格</th><th>積み方</th><th>入庫</th><th>出庫</th><th>備考</th></tr>`);
  day.nyuuka.filter(r=>r.company&&!r.deleted).forEach(r=>{win.document.write(`<tr><td>${r.no}</td><td>${r.company}</td><td>${r.name||''}</td><td>${r.tel||''}</td><td>${r.car||''}</td><td>${r.shakaku}</td><td>${r.tsumi}</td><td>${r.nyuuko||''}</td><td>${r.shukko||''}</td><td>${r.biko||''}</td></tr>`);});
  win.document.write(`</table><br><button onclick="window.print()">印刷</button></body></html>`);win.document.close();
}

initFirebase();
render();
setInterval(()=>{if(!S.modal&&['nyuuka','shukka','lotte','home'].includes(S.screen))render();},30000);
