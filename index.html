<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>川口弥平センター 受付システム</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
input,select,textarea{font-size:16px!important;} /* iOS zoom防止 */
/* iPad Safari: ボタンタップ確実化 */
button{
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  touch-action:manipulation;
  cursor:pointer;
  user-select:none;
  -webkit-appearance:none;
}
input,select{
  touch-action:manipulation;
  -webkit-appearance:none;
}
html,body{height:100%;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;font-size:14px;background:#f5f4f0;color:#1a1a1a;}
input,select,button,textarea{font-family:inherit;}

/* ===== CSS VARS ===== */
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0efe9;--border:#e0ddd5;--border2:#ccc9be;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --blue:#1a5fa8;--blue-bg:#e8f0fb;--blue-bd:#a8c4e8;
  --green:#2d7a3a;--green-bg:#e8f5ea;--green-bd:#90c896;
  --amber:#8a5c00;--amber-bg:#fdf3d8;--amber-bd:#e8c96a;
  --red:#b02020;--red-bg:#fdeaea;--red-bd:#e89090;
  --gray-bg:#f0efe9;--gray-bd:#ccc9be;
  --lotte:#7a2c00;--lotte-bg:#fdf0ea;
  --radius:8px;--radius-lg:12px;
}

/* ===== LAYOUT ===== */
#app{display:flex;flex-direction:column;min-height:100vh;}
.screen{flex:1;display:flex;flex-direction:column;}

/* ===== APP BAR ===== */
.app-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.app-bar-title{font-size:15px;font-weight:700;flex:1;letter-spacing:-.01em;}
.back-btn{
  display:flex;align-items:center;gap:4px;
  font-size:15px;color:var(--text2);
  background:none;border:none;
  padding:10px 16px 10px 4px;
  min-height:44px;
}
.back-btn:active{opacity:.6;}
.bar-badge{
  font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:999px;white-space:nowrap;
}
.bar-badge.alert{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
.bar-badge.ok{background:var(--green-bg);color:var(--green);}
.bar-badge.sync{background:var(--blue-bg);color:var(--blue);}
.bar-badge.offline{background:var(--amber-bg);color:var(--amber);}

/* ===== HOME ===== */
.home-hero{
  padding:20px 16px 14px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.home-title{font-size:22px;font-weight:800;letter-spacing:-.02em;}
.home-subtitle{font-size:12px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.sync-dot.live{background:#2d7a3a;animation:pulse 2s infinite;}
.sync-dot.offline{background:#8a5c00;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

.home-alert-bar{
  margin:12px 16px 0;
  padding:10px 14px;
  background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius);
  font-size:13px;color:var(--red);font-weight:600;
  display:none;
}
.home-alert-bar.show{display:block;}

.menu-grid{
  display:grid;grid-template-columns:1fr;gap:12px;
  padding:16px;
}
.menu-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px 14px;
  cursor:pointer;transition:border-color .15s,transform .1s;
  display:flex;flex-direction:column;gap:5px;
}
.menu-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.menu-card:active{transform:scale(.98);}
.menu-card.full{grid-column:1/-1;}
.menu-card.lotte-card{border-color:var(--lotte);background:var(--lotte-bg);}
.menu-card-icon{font-size:22px;line-height:1;}
.menu-card-label{font-size:14px;font-weight:700;}
.menu-card-sub{font-size:12px;color:var(--text2);}
.menu-card-alert{
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;
  background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);
  width:fit-content;margin-top:2px;
}

/* ===== DATE NAV ===== */
.date-nav{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.date-nav select{
  font-size:13px;padding:5px 8px;
  border:1px solid var(--border2);border-radius:var(--radius);
  background:var(--surface);color:var(--text);
  flex:1;min-width:0;max-width:240px;
}
.mode-tag{
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;
}
.mode-tag.today{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
.mode-tag.past{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd);}
.mode-tag.editing{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);}

/* ===== MOD BAR ===== */
.mod-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;font-size:12px;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.mod-bar.today{background:var(--green-bg);color:var(--green);}
.mod-bar.past{background:var(--blue-bg);color:var(--blue);}
.mod-bar.editing{background:var(--amber-bg);color:var(--amber);}
.mod-bar-msg{flex:1;font-weight:600;}
.toggle-edit-btn{
  font-size:12px;padding:5px 12px;border-radius:var(--radius);
  border:1px solid currentColor;background:var(--surface);
  cursor:pointer;font-weight:600;white-space:nowrap;color:inherit;
}

/* ===== ALERT BAR ===== */
.alert-bar{
  margin:8px 14px;padding:8px 12px;
  background:var(--red-bg);border:1px solid var(--red-bd);
  border-radius:var(--radius);font-size:12px;color:var(--red);font-weight:600;
}

/* ===== TABLE ===== */
.tbl-wrap{overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:800px;table-layout:fixed;}
thead th{
  background:var(--surface2);padding:7px 5px;
  font-size:11px;font-weight:700;color:var(--text2);
  text-align:left;border-bottom:1px solid var(--border);
  white-space:nowrap;position:sticky;top:0;z-index:10;
}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--surface2);}
tbody tr.row-ok{background:#e8f5ea;}
tbody tr.row-alert{background:#fdeaea;}
tbody tr.row-warn{background:#fdf3d8;}
tbody tr.row-deleted{background:var(--gray-bg);opacity:.55;}
td{padding:5px 4px;vertical-align:middle;}
td.no-col{font-size:11px;color:var(--text3);text-align:center;width:26px;}

/* ===== FORM ELEMENTS ===== */
.t-input{
  width:100%;font-size:16px;padding:7px 6px;
  border:1px solid var(--border2);border-radius:6px;
  background:var(--surface);color:var(--text);min-width:0;
  -webkit-appearance:none;
  touch-action:manipulation;
}
.t-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-bg);}
.t-select{
  font-size:16px;padding:7px 4px;
  border:1px solid var(--border2);border-radius:6px;
  background:var(--surface);color:var(--text);width:100%;
  -webkit-appearance:none;
  touch-action:manipulation;
}
.t-input:disabled,.t-select:disabled{opacity:.45;cursor:not-allowed;}
.time-wrap{display:flex;align-items:center;gap:4px;min-width:120px;}
.time-inp{
  width:62px;font-size:16px;padding:8px 4px;
  border:1px solid var(--border2);border-radius:6px;
  text-align:center;font-weight:600;
  -webkit-appearance:none;
  background:var(--surface);color:var(--text);
  text-align:center;letter-spacing:.04em;font-weight:500;
}
.time-inp.err{border-color:var(--red);background:var(--red-bg);}
.time-inp:disabled{opacity:.45;}
.time-inp::placeholder{font-size:11px;font-weight:400;letter-spacing:0;color:#bbb;}
.stamp-btn{
  font-size:14px;padding:9px 10px;
  border:1px solid var(--border2);border-radius:6px;
  background:var(--surface2);color:var(--text2);
  white-space:nowrap;transition:background .1s;font-weight:600;
  min-height:40px;
}
.stamp-btn:active{background:var(--border);}
.stamp-btn:hover{background:var(--border);}
.stamp-btn.stamped{background:var(--green-bg);border-color:var(--green-bd);color:var(--green);font-weight:700;}
.stamp-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ===== DELETE BTN ===== */
.del-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--red-bd);background:var(--red-bg);
  color:var(--red);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .1s;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  touch-action:manipulation;
}
.del-btn:hover{background:#f7c1c1;}
.del-btn:active{background:#f7c1c1;transform:scale(.92);}
.del-btn:disabled{opacity:.3;cursor:not-allowed;}
.restore-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  touch-action:manipulation;
}
.restore-btn:hover{background:var(--border);}
.restore-btn:active{transform:scale(.92);}

/* ===== STATUS DOT ===== */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;flex-shrink:0;}
.dot-empty{background:#ccc;}.dot-active{background:#2d7a3a;}
.dot-warn{background:#d4a017;}.dot-alert{background:#b02020;}
.dot-done{background:#1a7a4a;}.dot-del{background:#bbb;}

/* ===== FAB AREA ===== */
.fab-area{
  padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;
  background:var(--surface);border-top:1px solid var(--border);
  position:sticky;bottom:0;z-index:20;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
}
.fab-driver{
  width:100%;padding:20px 16px;
  border-radius:14px;
  border:none;
  background:var(--text);color:var(--surface);
  font-size:20px;font-weight:800;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  letter-spacing:-.01em;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  touch-action:manipulation;
  user-select:none;
  transition:opacity .1s,transform .1s;
}
.fab-driver:active{opacity:.85;transform:scale(.98);}
.fab-driver:disabled{opacity:.35;transform:none;}
.fab-driver-icon{font-size:26px;line-height:1;}
.fab-sub-row{display:flex;gap:8px;width:100%;}
.fab-sub{
  flex:1;padding:12px 8px;
  border-radius:10px;
  border:1px solid var(--border2);background:var(--surface2);
  font-size:13px;font-weight:700;color:var(--text2);
  cursor:pointer;text-align:center;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  touch-action:manipulation;
  user-select:none;
  transition:background .1s;
}
.fab-sub:active{background:var(--border);}
.fab-sub:disabled{opacity:.35;}
.fab{
  padding:9px 16px;border-radius:var(--radius);
  border:1px solid var(--border2);background:var(--surface);
  font-size:13px;font-weight:700;cursor:pointer;transition:background .1s;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  touch-action:manipulation;
  user-select:none;
}
.fab:hover{background:var(--surface2);}
.fab:active{transform:scale(.97);}
.fab-primary{background:var(--text);color:var(--surface);border-color:var(--text);}
.fab-primary:hover{opacity:.88;}
.fab-primary:active{opacity:.85;transform:scale(.97);}
.fab:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ===== EDIT LOG ROW ===== */
.edit-log-row td{
  font-size:11px;color:var(--text2);
  padding:2px 4px 5px;border-bottom:none;
  background:transparent!important;
}

/* ===== MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;
  padding:16px;z-index:500;
}
.modal{
  background:var(--surface);border-radius:var(--radius-lg);
  border:1px solid var(--border);width:100%;max-width:460px;
  padding:22px;max-height:90vh;overflow-y:auto;
}
.modal h3{font-size:17px;font-weight:800;margin-bottom:16px;letter-spacing:-.01em;}
.modal-record{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px 12px;
  margin-bottom:14px;font-size:13px;line-height:1.8;
}
.modal-record strong{font-weight:700;}
.modal-body{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:4px;}
.fg{margin-bottom:11px;}
.fg label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.03em;}
.fg input,.fg select{
  width:100%;font-size:14px;padding:8px 10px;
  border:1px solid var(--border2);border-radius:var(--radius);
  background:var(--surface);color:var(--text);
}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-bg);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.btn-ok{
  flex:1;padding:11px;
  background:var(--text);color:var(--surface);
  border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;
}
.btn-ok:hover{opacity:.88;}
.btn-danger{
  flex:1;padding:11px;
  background:var(--red);color:#fff;
  border:none;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;
}
.btn-cancel{
  padding:11px 16px;background:transparent;
  border:1px solid var(--border2);border-radius:var(--radius);
  font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;
}

/* ===== HISTORY / MISC ===== */
.list-wrap{padding:0 14px 80px;}
.list-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:7px;cursor:pointer;transition:border-color .1s;
}
.list-item:hover{border-color:var(--border2);}
.list-item-title{font-size:14px;font-weight:700;}
.list-item-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.list-arrow{font-size:18px;color:var(--text3);}

.driver-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:11px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px;
}
.driver-avatar{
  width:38px;height:38px;border-radius:50%;
  background:var(--blue-bg);border:1px solid var(--blue-bd);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:var(--blue);flex-shrink:0;
}
.export-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;
}
.export-card h4{font-size:14px;font-weight:700;margin-bottom:4px;}
.export-card p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.6;}
.export-btn{
  padding:7px 14px;border:1px solid var(--border2);
  border-radius:var(--radius);font-size:13px;font-weight:600;
  background:var(--surface2);cursor:pointer;margin-right:6px;margin-bottom:4px;
}
.export-btn:hover{background:var(--border);}

.section-label{
  font-size:11px;font-weight:700;color:var(--text2);
  padding:10px 16px 4px;letter-spacing:.06em;
}
.hidden{display:none!important;}

/* ===== ADMIN LOGIN ===== */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:16px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px 28px;width:100%;max-width:340px;}
.login-logo{font-size:32px;text-align:center;margin-bottom:8px;}
.login-title{font-size:18px;font-weight:800;text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:24px;}
.login-fg{margin-bottom:14px;}
.login-fg label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;}
.login-fg input{width:100%;font-size:15px;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);color:var(--text);}
.login-fg input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-bg);}
.login-btn{width:100%;padding:12px;background:var(--text);color:var(--surface);border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;}
.login-btn:hover{opacity:.88;}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px;}

/* ===== PIN PAD ===== */
.pin-display{
  display:flex;justify-content:center;gap:12px;margin:16px 0;
}
.pin-dot{
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--border2);background:transparent;
  transition:background .15s,border-color .15s;
}
.pin-dot.filled{background:var(--text);border-color:var(--text);}
.pin-dot.err{border-color:var(--red);background:var(--red);}
.pin-pad{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  max-width:240px;margin:0 auto;
}
.pin-key{
  height:56px;border-radius:var(--radius);
  border:1px solid var(--border2);background:var(--surface);
  font-size:20px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s,transform .1s;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  touch-action:manipulation;
  color:var(--text);
}
.pin-key:hover{background:var(--surface2);}
.pin-key:active{background:var(--border);transform:scale(.94);}
.pin-key.pin-del-key{font-size:16px;color:var(--text2);}
.pin-key.pin-zero{grid-column:2;}
.pin-title{font-size:15px;font-weight:700;text-align:center;margin-bottom:4px;}
.pin-sub{font-size:12px;color:var(--text2);text-align:center;margin-bottom:16px;}
.pin-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:16px;}

/* ===== TEL INPUT MODAL ===== */
.tel-modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.55);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:600;
  padding:0;
}
.tel-modal{
  background:var(--surface);
  border-radius:20px 20px 0 0;
  width:100%;max-width:520px;
  padding:0 0 env(safe-area-inset-bottom,12px);
  max-height:96vh;overflow-y:auto;
}
.tel-modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
}
.tel-modal-title{font-size:17px;font-weight:800;letter-spacing:-.01em;}
.tel-modal-close{
  width:36px;height:36px;border-radius:50%;
  border:none;background:var(--surface2);
  font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:rgba(0,0,0,0);
  touch-action:manipulation;
  color:var(--text2);
}
.tel-display{
  text-align:center;
  padding:14px 20px 10px;
  font-size:34px;font-weight:800;
  letter-spacing:.1em;
  color:var(--text);
  min-height:64px;
  font-family:'Hiragino Sans','Noto Sans JP',monospace;
}
.tel-display.placeholder{color:var(--border2);font-size:22px;font-weight:400;letter-spacing:.04em;}
.tel-lookup-result{
  margin:0 16px 12px;
  padding:12px 16px;
  border-radius:var(--radius-lg);
  font-size:14px;line-height:1.8;
  display:none;
}
.tel-lookup-result.found{
  background:var(--green-bg);border:1px solid var(--green-bd);
  display:block;
}
.tel-lookup-result.notfound{
  background:var(--surface2);border:1px solid var(--border);
  display:block;color:var(--text2);
}
.tel-lookup-name{font-size:18px;font-weight:800;color:var(--green);line-height:1.3;}

<!-- MODAL CONTAINER (outside root for z-index) -->
<div id="modal-container"></div>

<script>
// ============================================================
//  ★ FIREBASE CONFIG ★
//  Firebaseコンソール > プロジェクト設定 > マイアプリ から
//  コピーしたconfigに書き換えてください
// ============================================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA5wKvTnqeZ0zug5Jgmwklw7hOlR91zZYc",
  authDomain: "kawaguchi-uketsuke.firebaseapp.com",
  databaseURL: "https://kawaguchi-uketsuke-default-rtdb.firebaseio.com",
  projectId: "kawaguchi-uketsuke",
  storageBucket: "kawaguchi-uketsuke.firebasestorage.app",
  messagingSenderId: "332721520087",
  appId: "1:332721520087:web:4130e818983bfeffb0df92"
};
const FIREBASE_CONFIGURED = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";

// ============================================================
//  CONSTANTS
// ============================================================
const SHAKAKU = ['2t','4t','大型','コンテナ','軽'];
const TSUMI   = ['PL','バラ'];
const LOTTE_SRC = ['狭山工場','狭山工場倉庫','浦和工場','第一倉庫','戸田','滋賀工場','九州工場','その他'];

// ============================================================
//  FIREBASE / LOCAL STORAGE ABSTRACTION
// ============================================================
let fbDb = null;
let syncStatus = 'offline'; // 'live' | 'offline'

function initFirebase() {
  if (!FIREBASE_CONFIGURED) return;
  if (typeof firebase === 'undefined') return;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    
    // 匿名認証でサインイン（セキュリティルールで auth != null の条件を満たす）
    firebase.auth().signInAnonymously()
      .then(function(userCred){
        // 認証成功後にDBに接続
        fbDb = firebase.database();
        syncStatus = 'live';
        render(); // UI更新（同期中表示）
        
        // Listen for realtime updates from Firebase
        fbDb.ref('kawaguchi').on('value', function(snap){
          var data = snap.val();
          if (!data) return;
          if (data.db) {
            S.db = data.db;
            ensureDay(S.db, todayKey());
          }
          if (data.drivers) S.drivers = data.drivers;
          if (!S.modal) render();
        });
      })
      .catch(function(err){
        console.error('Firebase auth error:', err);
        syncStatus = 'offline';
        render();
      });
  } catch(e) {
    syncStatus = 'offline';
  }
}

function remoteSave() {
  if (!fbDb) { localSave(); return; }
  try {
    fbDb.ref('kawaguchi').set({ db: S.db, drivers: S.drivers });
  } catch(e) {
    localSave();
  }
}

function localSave() {
  try {
    localStorage.setItem('kw_db_v5', JSON.stringify(S.db));
    localStorage.setItem('kw_dr_v5', JSON.stringify(S.drivers));
  } catch(e) {}
}

function save() {
  localSave();   // always save locally as backup
  remoteSave();  // also push to Firebase if configured
}

function loadLocal() {
  let db={}, drivers=[];
  try { db = JSON.parse(localStorage.getItem('kw_db_v5')||'{}'); } catch{}
  try { drivers = JSON.parse(localStorage.getItem('kw_dr_v5')||'[]'); } catch{}
  return {db, drivers};
}

// ============================================================
//  HELPERS
// ============================================================
function todayKey(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtKey(k){
  const[y,m,d]=k.split('-');
  const wd=['日','月','火','水','木','金','土'];
  const dt=new Date(+y,+m-1,+d);
  return `${y}年${m}月${d}日（${wd[dt.getDay()]}）`;
}
function nowStr(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function nowFull(){
  const d=new Date();
  return `${d.getMonth()+1}/${d.getDate()} ${nowStr()}`;
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function mkNRow(no){ return {id:uid(),no,fuda:'',company:'',name:'',tel:'',car:'',shakaku:'2t',tsumi:'バラ',nyuuko:'',shukko:'',biko:'',deleted:false,editLog:[]}; }
function mkLRow(no){ return {id:uid(),no,company:'',name:'',tel:'',car:'',shakaku:'2t',order:'',type:'入荷',src:'狭山工場',srcOther:'',tochaku:'',basu:'',sakuEnd:'',shuppatsu:'',deleted:false,editLog:[]}; }

function ensureDay(db, key) {
  if (!db[key]) {
    db[key] = {
      nyuuka: Array.from({length:20},(_,i)=>mkNRow(i+1)),
      shukka: Array.from({length:20},(_,i)=>mkNRow(i+1)),
      lotte:  Array.from({length:15},(_,i)=>mkLRow(i+1)),
      created: key
    };
  }
  // Ensure arrays exist (for older data)
  ['nyuuka','shukka'].forEach(t=>{ if(!db[key][t]) db[key][t]=Array.from({length:20},(_,i)=>mkNRow(i+1)); });
  if (!db[key].lotte) db[key].lotte = Array.from({length:15},(_,i)=>mkLRow(i+1));
  return db[key];
}

// ============================================================
//  STATE
// ============================================================
const {db: initDb, drivers: initDrivers} = loadLocal();
// ===== ADMIN AUTH =====
const DEFAULT_ADMIN_PASS = "kawaguchi2024";
const SESSION_KEY = "kw_admin_session";
const PIN_STORAGE_KEY = "kw_delete_pin";
const ADMIN_PW_STORAGE_KEY = "kw_admin_pw";

function getAdminPass(){
  return localStorage.getItem(ADMIN_PW_STORAGE_KEY) || DEFAULT_ADMIN_PASS;
}
function getDeletePin(){
  return localStorage.getItem(PIN_STORAGE_KEY) || null; // null = PIN未設定
}
function setDeletePin(pin){
  if(pin) localStorage.setItem(PIN_STORAGE_KEY, pin);
  else localStorage.removeItem(PIN_STORAGE_KEY);
}
function setAdminPass(pw){
  if(pw) localStorage.setItem(ADMIN_PW_STORAGE_KEY, pw);
}
function isAdminLoggedIn(){
  return sessionStorage.getItem(SESSION_KEY) === "1";
}
function adminLogin(pass){
  if(pass === getAdminPass()){ sessionStorage.setItem(SESSION_KEY,"1"); return true; }
  return false;
}
function adminLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  S.screen = "home";
  render();
}

// ===== WIZARD STATE =====
const WIZ = {
  active: false,
  type: 'nyuuka', // nyuuka | shukka | lotte
  step: 'tel',
  tel: '',
  company: '',
  name: '',
  car: '',
  shakaku: '',
  tsumi: '',
  fuda: '',
  biko: '',
  // lotte専用
  order: '',
  orderIn: '',
  orderOut: '',
  nyukaType: '',
  src: '',
  srcOther: '',
  srcIn: '',
  srcInOther: '',
  driver: null,
  isNew: false,
  consent: false,
};

const S = {
  screen: 'home',
  viewDate: todayKey(),
  editMode: false,
  modal: null,
  modalData: {},
  alertWarn: 60,
  alertDanger: 90,
  db: initDb,
  drivers: initDrivers,
};
ensureDay(S.db, todayKey());
localSave();

// ============================================================
//  STATUS LOGIC
// ============================================================
function toMin(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
function elapsed(t){if(!t)return null;const b=toMin(t);const n=new Date();return n.getHours()*60+n.getMinutes()-b;}
function timeOk(a,b){if(!a||!b)return true;return toMin(a)<=toMin(b);}

function rowStatus(r,type){
  if(r.deleted)return 'deleted';
  if(type==='lotte'){
    const times=[r.tochaku,r.basu,r.sakuEnd,r.shuppatsu];
    const hasAny=times.some(Boolean)||r.company;
    if(!hasAny)return 'empty';
    for(let i=1;i<times.length;i++){
      if(times[i-1]&&times[i]&&toMin(times[i-1])>toMin(times[i]))return 'alert';
    }
    if(r.shuppatsu)return 'done';
    if(r.tochaku){const e=elapsed(r.tochaku);if(e>=S.alertDanger)return 'alert';if(e>=S.alertWarn)return 'warn';}
    return hasAny?'active':'empty';
  }
  if(!r.company&&!r.nyuuko)return 'empty';
  if(r.nyuuko&&r.shukko){if(!timeOk(r.nyuuko,r.shukko))return 'alert';return 'done';}
  if(r.nyuuko){const e=elapsed(r.nyuuko);if(e>=S.alertDanger)return 'alert';if(e>=S.alertWarn)return 'warn';}
  return r.company?'active':'empty';
}
function dotCls(st){
  return 'dot dot-'+({empty:'empty',active:'active',warn:'warn',alert:'alert',done:'done',deleted:'del'}[st]||'empty');
}
function rowCls(st){
  return ({alert:'row-alert',warn:'row-warn',done:'row-ok',deleted:'row-deleted'}[st]||'');
}
function findDriver(tel){const t=(tel||'').replace(/[-\s]/g,'');return S.drivers.find(d=>d.tel===t);}
function allDates(){return Object.keys(S.db).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort().reverse();}
function isToday(){return S.viewDate===todayKey();}
function canEdit(){return isToday()||S.editMode;}
function todayData(){return S.db[todayKey()];}
function viewed(){return S.db[S.viewDate]||ensureDay(S.db,S.viewDate);}

// ============================================================
//  RENDER ENGINE
// ============================================================
const root = document.getElementById('root');
const modalContainer = document.getElementById('modal-container');

function render(){
  modalContainer.innerHTML = '';
  if(WIZ.active){ renderWizard(); return; }
  if(S.modal){ renderModal(); return; }
  root.innerHTML = '';
  const adminRequired = ['drivers','history','export'];
  if(adminRequired.includes(S.screen) && !isAdminLoggedIn()){
    renderAdminLogin(S.screen);
    return;
  }
  if(S.screen==='home')       renderHome();
  else if(S.screen==='nyuuka') renderTable('nyuuka');
  else if(S.screen==='shukka') renderTable('shukka');
  else if(S.screen==='lotte')  renderLotte();
  else if(S.screen==='drivers') renderDrivers();
  else if(S.screen==='history') renderHistory();
  else if(S.screen==='export')  renderExport();
}

function renderAdminLogin(destScreen){
  root.innerHTML = `

    <div class="login-card">

function doAdminLogin(destScreen){
  const pw = document.getElementById('admin-pw-input')?.value || '';
  if(adminLogin(pw)){
    S.screen = 'home'; // ログイン後はホームに戻してメニューを表示
    render();
  } else {
    document.getElementById('admin-err').textContent = 'パスワードが違います';
    document.getElementById('admin-pw-input').value = '';
    document.getElementById('admin-pw-input').focus();
  }
}

function go(sc){ S.screen=sc; S.editMode=false; render(); }
function e(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ---------- DATE NAV & MOD BAR ----------
function dateNavHtml(label){
  const dates=allDates();
  const opts=dates.map(k=>`<option value="${k}"${k===S.viewDate?' selected':''}>${fmtKey(k)}${k===todayKey()?' 【本日】':''}</option>`).join('');
  const tagCls=isToday()?'today':S.editMode?'editing':'past';
  const tagLabel=isToday()?'本日':S.editMode?'修正モード':'閲覧中';
  return `<div class="date-nav">
    <select onchange="S.viewDate=this.value;S.editMode=false;render();">${opts}</select>
    <span class="mode-tag ${tagCls}">${tagLabel}</span>
  </div>`;
}
function modBarHtml(){
  if(isToday()) return `<div class="mod-bar today"><span class="mod-bar-msg">✓ 本日のデータを編集中</span></div>`;
  if(S.editMode) return `<div class="mod-bar editing"><span class="mod-bar-msg">✎ 後日修正モード — 変更は修正記録に残ります</span><button class="toggle-edit-btn" onclick="S.editMode=false;render();">修正を終了</button></div>`;
  return `<div class="mod-bar past"><span class="mod-bar-msg">閲覧のみ（読み取り専用）</span><button class="toggle-edit-btn" onclick="S.editMode=true;render();">後日修正を行う</button></div>`;
}

// ============================================================
//  ACTIONS
// ============================================================
function confirmDelete(type,id){
  const day=S.db[S.viewDate];
  const r=day[type].find(x=>x.id===id);
  if(!r)return;
  S.modal='confirmDelete'; S.modalData={type,id,r}; render();
}
function confirmRestore(type,id){
  const day=S.db[S.viewDate];
  const r=day[type].find(x=>x.id===id);
  if(!r)return;
  S.modal='confirmRestore'; S.modalData={type,id,r}; render();
}
function confirmDelDriver(id,name){
  S.modal='confirmDelDriver'; S.modalData={id,name}; render();
}
function doDelete(){
  const {type,id}=S.modalData;
  const r=S.db[S.viewDate][type].find(x=>x.id===id);
  if(r){r.deleted=true;if(!r.editLog)r.editLog=[];r.editLog.push(`${nowFull()} 削除`);save();}
  closeModal();
}
function doRestore(){
  const {type,id}=S.modalData;
  const r=S.db[S.viewDate][type].find(x=>x.id===id);
  if(r){r.deleted=false;if(!r.editLog)r.editLog=[];r.editLog.push(`${nowFull()} 削除取消`);save();}
  closeModal();
}
function doDelDriver(){
  S.drivers=S.drivers.filter(d=>d.id!==S.modalData.id);
  save(); closeModal(); go('drivers');
}

let _updTimer = {};
function upd(type,id,field,val){
  const day=S.db[S.viewDate];if(!day)return;
  const r=day[type].find(x=>x.id===id);
  if(!r||r.deleted)return;
  const old=r[field];
  r[field]=val;
  if(!isToday()&&old!==val&&old!==undefined&&old!==''){
    if(!r.editLog)r.editLog=[];
    r.editLog.push(`${nowFull()} ${field}「${old||'空'}」→「${val}」`);
  }
  // Debounce saves: wait 600ms after last keystroke before saving
  const key=`${type}-${id}-${field}`;
  clearTimeout(_updTimer[key]);
  _updTimer[key]=setTimeout(()=>save(), 600);
}
function stamp(type,id,field){
  if(!isToday())return;
  const r=todayData()[type].find(x=>x.id===id);
  if(!r||r.deleted)return;
  r[field]=nowStr(); save(); render();
}
function stampNow(type,id,field,cur){
  // 未打刻なら即打刻、打刻済みならモーダルで修正
  if(!cur){ stamp(type,id,field); }
  else { openTimeModal(type,id,field,cur); }
}
// ===== TEL INPUT MODAL =====
let _telState = { type:'', id:'', buf:'' };

function openTelModal(type, id){
  const day = S.db[S.viewDate];
  const r = day[type].find(x=>x.id===id);
  if(!r) return;
  _telState = { type, id, buf: (r.tel||'').replace(/[-\s]/g,'') };
  renderTelModal();
}

function renderTelModal(){
  const {type, id, buf} = _telState;
  const day = S.db[S.viewDate];
  const r = day[type].find(x=>x.id===id);
  if(!r) return;

  // 既存データをフォームに反映
  const company = r.company||'';
  const name = r.name||'';
  const car = r.car||'';
  const shakaku = r.shakaku||'2t';

  // ドライバーDB照合
  const driver = buf.length>=10 ? findDriver(buf) : null;

  const dispBuf = buf.length>0
    ? buf.replace(/^(\d{3})(\d{4})(\d{0,4})$/,'$1-$2-$3').replace(/-$/,'')
    : '';

  const resultHtml = buf.length >= 10
    ? (driver
        ? `<div class="tel-lookup-result found">
            <div class="tel-lookup-name">✓ ${driver.name}</div>
            <div class="tel-lookup-sub">${driver.company||''} ／ 車番:${driver.car||'―'} ／ ${driver.shakaku}</div>
           </div>`
        : `<div class="tel-lookup-result notfound">
            <div style="font-size:14px;font-weight:600;">新規ドライバー</div>
            <div class="tel-lookup-sub">DBに登録がありません。下欄に会社名・氏名を入力してください。</div>
           </div>`)
    : '';

  const showFields = buf.length >= 10;

  const keyLabels = [
    ['1',''],['2','ABC'],['3','DEF'],
    ['4','GHI'],['5','JKL'],['6','MNO'],
    ['7','PQRS'],['8','TUV'],['9','WXYZ'],
  ];

  const keysHtml = keyLabels.map(([n,s])=>`
    <button class="tel-key"
      onpointerup="telKeyPress('${n}')"
      onclick="telKeyPress('${n}')">
      ${n}<span class="tel-key-sub">${s}</span>
    </button>`).join('');

  const existingOverlay = document.getElementById('tel-modal-overlay');
  if(existingOverlay) existingOverlay.remove();

  const div = document.createElement('div');
  div.id = 'tel-modal-overlay';
  div.className = 'tel-modal-overlay';
  div.innerHTML = `
    <div class="tel-modal">
      <div class="tel-modal-header">
        <div class="tel-modal-title">電話番号を入力</div>
        <button class="tel-modal-close"
          onpointerup="closeTelModal()"
          onclick="closeTelModal()">✕</button>
      </div>
      <div class="tel-display ${buf.length===0?'placeholder':''}" id="tel-disp">
        ${buf.length===0 ? '090-0000-0000' : dispBuf}
      </div>
      ${resultHtml}
      <div class="tel-keypad">
        ${keysHtml}
        <button class="tel-key" style="visibility:hidden;"></button>
        <button class="tel-key"
          onpointerup="telKeyPress('0')"
          onclick="telKeyPress('0')">0</button>
        <button class="tel-key tel-del"
          onpointerup="telKeyDel()"
          onclick="telKeyDel()">⌫</button>
      </div>
      <div class="tel-fields ${showFields?'show':''}" id="tel-fields">
        <div style="font-size:12px;color:var(--text2);padding:4px 0 8px;font-weight:600;">確認・修正してください</div>
        <div class="tel-field-row">
          <div class="tel-field-label">運送会社名</div>
          <input class="tel-field-val" id="tf-company" type="text" value="${company}" placeholder="（株）〇〇運輸">
        </div>
        <div class="tel-field-row">
          <div class="tel-field-label">氏名</div>
          <input class="tel-field-val" id="tf-name" type="text" value="${name}" placeholder="山田 太郎">
        </div>
        <div class="tel-field-row">
          <div class="tel-field-label">車番</div>
          <input class="tel-field-val" id="tf-car" type="text" value="${car}" placeholder="1234">
        </div>
        <div class="tel-field-row">
          <div class="tel-field-label">車格</div>
          <select class="tel-field-val" id="tf-shakaku">
            ${['2t','4t','大型','コンテナ','軽'].map(s=>`<option${shakaku===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
      <button class="tel-confirm-btn" id="tel-confirm-btn"
        ${buf.length<10?'disabled style="opacity:.4;"':''}
        onpointerup="confirmTelInput()"
        onclick="confirmTelInput()">
        ${buf.length<10 ? '電話番号を入力してください' : '確定して受付に反映'}
      </button>
      <div style="height:8px;"></div>
    </div>`;
  document.body.appendChild(div);
}

function telKeyPress(n){
  if(_telState.buf.length >= 11) return;
  _telState.buf += n;
  renderTelModal();
}
function telKeyDel(){
  _telState.buf = _telState.buf.slice(0,-1);
  renderTelModal();
}
function closeTelModal(){
  const el = document.getElementById('tel-modal-overlay');
  if(el) el.remove();
}
function confirmTelInput(){
  const {type, id, buf} = _telState;
  if(buf.length < 10) return;
  const day = S.db[S.viewDate];
  const r = day[type].find(x=>x.id===id);
  if(!r) return;

  // 電話番号保存
  r.tel = buf;

  // フォームの値を反映
  const company = document.getElementById('tf-company')?.value?.trim()||'';
  const name    = document.getElementById('tf-name')?.value?.trim()||'';
  const car     = document.getElementById('tf-car')?.value?.trim()||'';
  const shakaku = document.getElementById('tf-shakaku')?.value||'2t';

  if(company) r.company = company;
  if(name)    r.name    = name;
  if(car)     r.car     = car;
  r.shakaku = shakaku;

  save();
  closeTelModal();
  render();
}

function lotSrc(id,val){
  upd('lotte',id,'src',val);
  if(val==='その他'){
    // その他はモーダルで入力（テーブル内で隠れる問題を回避）
    S.modal='srcOther';
    S.modalData={id};
    render();
  } else {
    render();
  }
}
function telLookup(type,id,tel){
  if(!canEdit())return;
  const d=findDriver(tel);if(!d)return;
  const r=S.db[S.viewDate][type].find(x=>x.id===id);
  if(!r||r.deleted)return;
  let changed=false;
  if(!r.company&&d.company){r.company=d.company;changed=true;}
  if(!r.name&&d.name){r.name=d.name;changed=true;}
  if(!r.car&&d.car){r.car=d.car;changed=true;}
  if(d.shakaku){r.shakaku=d.shakaku;changed=true;}
  if(changed){save();render();}
}
function addRows(type){
  if(!isToday())return;
  const day=todayData();
  const base=day[type].length;
  for(let i=0;i<5;i++) day[type].push(type==='lotte'?mkLRow(base+i+1):mkNRow(base+i+1));
  save(); render();
}

function submitModal(type){
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
  if(type==='driver'){
    const name=g('m-name'),tel=g('m-tel').replace(/[-\s]/g,'');
    if(!name||!tel){alert('氏名と電話番号は必須です');return;}
    S.drivers.push({id:uid(),company:g('m-company'),name,tel,car:g('m-car'),shakaku:g('m-shakaku')||'2t'});
    save(); closeModal(); return;
  }
  const company=g('m-company');
  if(!company){alert('運送会社名は必須です');return;}
  const tel=g('m-tel').replace(/[-\s]/g,'');
  const day=todayData();
  const arr=day[type];
  const slot=arr.find(r=>!r.company&&!r.deleted&&(type==='lotte'?!r.tochaku:!r.nyuuko));
  const r=slot||(type==='lotte'?mkLRow(arr.length+1):mkNRow(arr.length+1));
  r.company=company;r.name=g('m-name');r.tel=tel;r.car=g('m-car');
  r.shakaku=g('m-shakaku')||'2t';
  if(type==='lotte'){
    r.order=g('m-order');r.type=g('m-type')||'入荷';
    const src=g('m-src');r.src=src;r.srcOther=src==='その他'?g('m-src-other'):'';
    r.tochaku=nowStr();
  } else {
    r.tsumi=g('m-tsumi')||'バラ';r.fuda=g('m-fuda');r.biko=g('m-biko');
    r.nyuuko=nowStr();
  }
  if(!slot)arr.push(r);
  save(); S.modal=null; S.viewDate=todayKey(); S.screen=type; render();
}

// 電話番号を Excel で文字列として認識させる（先頭0消え対策）
function csvTel(tel){
  if(!tel) return '';
  // ダブルクオートで囲んで = を付ける → Excel が文字列として扱う
  return '="'+String(tel).replace(/"/g,'""')+'"';
}
// CSV セルのエスケープ（カンマや改行を含む場合）
function csvCell(v){
  if(v===null||v===undefined) return '';
  var s=String(v);
  if(s.indexOf(',')>=0||s.indexOf('"')>=0||s.indexOf('\n')>=0){
    return '"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}

let _pinBuffer = '';

function pinPress(n){
  if(_pinBuffer.length >= 4) return;
  _pinBuffer += String(n);
  updatePinDisplay();
  if(_pinBuffer.length === 4){
    setTimeout(()=>checkPin(), 120);
  }
}
function pinDel(){
  _pinBuffer = _pinBuffer.slice(0,-1);
  updatePinDisplay();
  // エラー表示をクリア
  const errEl=document.getElementById('pin-err');
  if(errEl) errEl.textContent='';
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d) d.classList.remove('err');
  }
}
function updatePinDisplay(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d) d.classList.toggle('filled', i<_pinBuffer.length);
  }
}
function checkPin(){
  const pin=getDeletePin();
  if(_pinBuffer === pin){
    doDelete();
  } else {
    // エラー表示
    for(let i=0;i<4;i++){
      const d=document.getElementById('pd'+i);
      if(d){d.classList.remove('filled');d.classList.add('err');}
    }
    const errEl=document.getElementById('pin-err');
    if(errEl) errEl.textContent='PINが違います。もう一度入力してください。';
    setTimeout(()=>{
      _pinBuffer='';
      for(let i=0;i<4;i++){
        const d=document.getElementById('pd'+i);
        if(d){d.classList.remove('err');d.classList.remove('filled');}
      }
      if(errEl) errEl.textContent='';
    }, 1200);
  }
}

function startWizard(type){
  WIZ.active=true; WIZ.type=type; WIZ.step='tel';
  WIZ.tel=''; WIZ.company=''; WIZ.name='';
  WIZ.car=''; WIZ.shakaku=''; WIZ.tsumi='';
  WIZ.fuda=''; WIZ.biko='';
  WIZ.order=''; WIZ.nyukaType=''; WIZ.src=''; WIZ.srcOther='';
  WIZ.driver=null; WIZ.isNew=false; WIZ.consent=false;

function wizBack(){
  const flow = wizFlow();
  const idx = flow.indexOf(WIZ.step);
  if(idx<=0){ WIZ.active=false; render(); return; }
  WIZ.step = flow[idx-1];
  renderWizard();
}
function wizFlow(){
  // lotte登録済み: tel → confirm_existing → lotte_info → final
  // lotte新規:     tel → name → car → lotte_info → consent → final
  // 通常登録済み: tel → confirm_existing → final
  // 通常新規:     tel → name → car → consent → final
  if(WIZ.type==='lotte'){
    if(!WIZ.isNew) return ['tel','confirm_existing','lotte_info','final'];
    return ['tel','name','car','lotte_info','consent','final'];
  }
  if(!WIZ.isNew) return ['tel','confirm_existing','final'];
  return ['tel','name','car','consent','final'];
}

function renderWizard(){
  root.innerHTML='';
  modalContainer.innerHTML='';
  const label=WIZ.type==='nyuuka'?'入荷受付':WIZ.type==='shukka'?'出荷受付':'ロッテ様受付';
  const flow=wizFlow();
  const idx=flow.indexOf(WIZ.step);
  const total=flow.length;
  const prog=Math.round(((idx+1)/total)*100);
  const stepLabels={
    tel:'電話番号入力',
    confirm_existing:'登録情報の確認',
    name:'会社名・お名前',
    car:'車番・車格',
    consent:'個人情報の取り扱い',
    final:'受付内容の確認',
  };

  let body='';
  let nextLabel='次へ　→';
  let nextDisabled=false;
  let isLastStep=(WIZ.step==='final');
  let isStampStep=isLastStep;

  // ===== STEP: 電話番号 =====
  if(WIZ.step==='tel'){
    const buf=WIZ.tel;
    const disp=buf.length>0
      ? buf.replace(/^(\d{3})(\d{4})(\d{0,4})$/,'$1-$2-$3').replace(/-$/,'')
      : '';
    const driver=buf.length>=10?findDriver(buf):null;
    nextDisabled=buf.length<10;
    nextLabel=driver?'登録情報を確認する\u3000→':'情報を入力する\u3000→';

    const keyLabels=[['1',''],['2','ABC'],['3','DEF'],['4','GHI'],['5','JKL'],['6','MNO'],['7','PQRS'],['8','TUV'],['9','WXYZ']];
    const keysHtml=keyLabels.map(([n,s])=>`
      <button class="wiz-key" onclick="wizTelKey('${n}')">
        ${n}<span class="wiz-key-sub">${s}</span>
      </button>`).join('');

    // 照合結果（テンキーの下・固定高さ）
    let resultHtml='';
    if(buf.length>=10){
      if(driver){

          <div class="wiz-confirm-label">オーダーNo</div>
          <div class="wiz-confirm-val">${e(WIZ.order||'―')}</div>
        </div>`}
        <div class="wiz-confirm-row">
          <div class="wiz-confirm-label">積み方</div>
          <div class="wiz-confirm-val">${WIZ.tsumi||''}</div>
        </div>`:`
        <div class="wiz-confirm-row">
          <div class="wiz-confirm-label">積み方</div>
          <div class="wiz-confirm-val">${WIZ.tsumi||'バラ'}</div>
        </div>`}
      </div>
      <div style="background:var(--green-bg);border:1px solid var(--green-bd);border-radius:var(--radius-lg);padding:14px 16px;font-size:14px;color:var(--green);font-weight:600;line-height:1.7;">
        ${WIZ.type==='lotte'
          ?'「受付完了 ＋ 到着打刻」を押すと現在時刻で到着時間が登録されます。バース着車・作業終了・出発は一覧画面で打刻してください。'
          :'「受付完了 ＋ 入庫打刻」を押すと現在時刻で入庫時間が登録されます。'
        }
      </div>`;
  }

  root.innerHTML=`
  <div class="wiz-screen">
    <div class="wiz-header">
      <button class="wiz-back" onpointerup="wizBack()" onclick="wizBack()">←</button>
      <div class="wiz-header-info">
        <div class="wiz-title">${label} 受付</div>
        <div class="wiz-step-label">${stepLabels[WIZ.step]||''}</div>
      </div>
    </div>
    <div class="wiz-progress"><div class="wiz-progress-bar" style="width:${prog}%;"></div></div>
    <div class="wiz-body">${body}</div>
    <div class="wiz-footer">
      ${isStampStep
        ? `<button class="wiz-next-btn stamp"
             onpointerup="wizComplete()"
             onclick="wizComplete()">${WIZ.type==='lotte'?'受付完了 ＋ 到着打刻':'受付完了 ＋ 入庫打刻'}</button>`
        : `<button class="wiz-next-btn"
             ${nextDisabled?'disabled':''}
             onpointerup="if(!this.disabled){wizNext()}"
             onclick="if(!this.disabled){wizNext()}">${nextLabel}</button>`
      }
    </div>
  </div>`;
}


function wizTelKey(n){
  if(WIZ.tel.length>=11) return;
  WIZ.tel+=n;
  renderWizard();
}
function wizTelDel(){
  WIZ.tel=WIZ.tel.slice(0,-1);
  renderWizard();
}

function wizNext(){
  const flow=wizFlow();
  const idx=flow.indexOf(WIZ.step);
  // lotte_info でオーダーNoチェック（inputから取得）
  if(WIZ.step==='lotte_info'){
    var _hN = hasNyukaType('入荷'), _hS = hasNyukaType('出荷');
    if(_hN && _hS){
      // 両方選択
      var oin = document.getElementById('wiz-order-in');
      var oout = document.getElementById('wiz-order-out');
      if(oin) WIZ.orderIn = oin.value.trim();
      if(oout) WIZ.orderOut = oout.value.trim();
      if(!WIZ.orderIn && !WIZ.orderOut){
        alert('オーダーNoを入力してください（入荷・出荷どちらかは必須）');
        if(oin) oin.focus();
        return;
      }
    } else {
      // 単独選択
      var ordInp = document.getElementById('wiz-order');
      if(ordInp) WIZ.order = ordInp.value.trim();
      if(!WIZ.order){
        alert('オーダーNoを入力してください');
        if(ordInp) ordInp.focus();
        return;
      }
    }
  }
  if(WIZ.step==='tel'){
    const d=findDriver(WIZ.tel);
    if(d){
      WIZ.driver=d; WIZ.isNew=false;
      WIZ.company=d.company||''; WIZ.name=d.name||'';
      WIZ.car=d.car||''; WIZ.shakaku=d.shakaku||'';
      WIZ.tsumi=d.tsumi||'';
      WIZ.step='confirm_existing';
    } else {
      WIZ.driver=null; WIZ.isNew=true; WIZ.step='name';
    }
  } else if(WIZ.step==='confirm_existing'){
    const c=document.getElementById('wiz-company');
    const n=document.getElementById('wiz-name');
    const car=document.getElementById('wiz-car');
    const sh=document.getElementById('wiz-shakaku');
    const ts=document.getElementById('wiz-tsumi');
    if(c)WIZ.company=c.value.trim(); if(n)WIZ.name=n.value.trim();
    if(car)WIZ.car=car.value.trim(); if(sh)WIZ.shakaku=sh.value;
    if(ts)WIZ.tsumi=ts.value;
    WIZ.step=flow[idx+1];
  } else if(WIZ.step==='name'){
    const c=document.getElementById('wiz-company');
    const n=document.getElementById('wiz-name');
    if(c)WIZ.company=c.value.trim(); if(n)WIZ.name=n.value.trim();
    WIZ.step='car';
  } else if(WIZ.step==='car'){
    const car=document.getElementById('wiz-car');
    const sh=document.getElementById('wiz-shakaku');
    const ts=document.getElementById('wiz-tsumi');
    const fd=document.getElementById('wiz-fuda');
    if(car)WIZ.car=car.value.trim(); if(sh)WIZ.shakaku=sh.value;
    if(ts)WIZ.tsumi=ts.value; if(fd)WIZ.fuda=fd.value;
    WIZ.step=flow[idx+1];
  } else if(WIZ.step==='lotte_info'){
    const ord=document.getElementById('wiz-order');
    const src=document.getElementById('wiz-src');
    const sro=document.getElementById('wiz-src-other');
    const sin=document.getElementById('wiz-srcin');
    const sio=document.getElementById('wiz-srcin-other');
    if(ord)WIZ.order=ord.value.trim();
    if(src)WIZ.src=src.value;
    if(sro)WIZ.srcOther=sro.value.trim();
    if(sin)WIZ.srcIn=sin.value;
    if(sio)WIZ.srcInOther=sio.value.trim();
    WIZ.step=flow[idx+1];
  } else if(WIZ.step==='consent'){
    WIZ.step='final';
  }
  renderWizard();
}

function wizComplete(){
  // confirm_existing の場合、入力修正をWIZに反映
  if(WIZ.step==='confirm_existing'){
    const c=document.getElementById('wiz-company');
    const n=document.getElementById('wiz-name');
    const car=document.getElementById('wiz-car');
    const sha=document.getElementById('wiz-shakaku');
    const tsu2=document.getElementById('wiz-tsumi');
    if(c) WIZ.company=c.value.trim();
    if(n) WIZ.name=n.value.trim();
    if(car) WIZ.car=car.value.trim();
    if(sha) WIZ.shakaku=sha.value;
    if(tsu2) WIZ.tsumi=tsu2.value;
    // 登録済みドライバーのDB情報を最新に更新
    if(WIZ.driver){
      WIZ.driver.company=WIZ.company;
      WIZ.driver.name=WIZ.name;
      WIZ.driver.car=WIZ.car;
      WIZ.driver.shakaku=WIZ.shakaku;
    }
  }

  const day=todayData();
  const arr=day[WIZ.type];
  if(WIZ.type==='lotte'){
    // 入荷/出荷両方選択されている場合は2行に分ける
    var types = WIZ.nyukaType ? WIZ.nyukaType.split(',').filter(function(x){return x;}) : [''];
    var nowT = nowStr();
    types.forEach(function(typ){
      var slot=arr.find(function(r){return !r.company&&!r.tochaku&&!r.deleted;});
      var r=slot||mkLRow(arr.length+1);
      r.tel=WIZ.tel;
      r.company=WIZ.company;
      r.name=WIZ.name;
      r.car=WIZ.car;
      r.shakaku=WIZ.shakaku;
      r.tsumi=WIZ.tsumi||'';
      r.order=WIZ.order||'';
      r.type=typ;
      // 出荷なら入荷元(src)、入荷なら出荷先(srcIn)を使用
      if(typ==='入荷'){
        r.src=WIZ.srcIn||'';
        r.srcOther=WIZ.srcIn==='その他'?WIZ.srcInOther:'';
      } else {
        r.src=WIZ.src||'';
        r.srcOther=WIZ.src==='その他'?WIZ.srcOther:'';
      }
      r.tochaku=nowT; // 到着時間を打刻（両行とも同じ時刻）
      r.basu=''; r.sakuEnd=''; r.shuppatsu='';
      if(!slot) arr.push(r);
    });
  } else {
    const slot=arr.find(r=>!r.company&&!r.nyuuko&&!r.deleted);
    const r=slot||mkNRow(arr.length+1);
    r.tel=WIZ.tel;
    r.company=WIZ.company;
    r.name=WIZ.name;
    r.car=WIZ.car;
    r.shakaku=WIZ.shakaku||'';
    r.tsumi=WIZ.tsumi||'';
    r.fuda=WIZ.fuda||'';
    r.nyuuko=nowStr();
    if(!slot) arr.push(r);
  }

  // 新規ドライバーは同意済みなのでDBに自動登録
  if(WIZ.isNew && WIZ.consent && WIZ.tel && WIZ.name){
    S.drivers.push({
      id:uid(),company:WIZ.company,name:WIZ.name,
      tel:WIZ.tel,car:WIZ.car,shakaku:WIZ.shakaku,tsumi:WIZ.tsumi||''
    });
  }
  // 登録済みドライバーの情報を更新（修正があれば）
  if(WIZ.driver){
    const idx=S.drivers.findIndex(d=>d.tel===WIZ.tel);
    if(idx>=0) S.drivers[idx]={...S.drivers[idx],company:WIZ.company,name:WIZ.name,car:WIZ.car,shakaku:WIZ.shakaku,tsumi:WIZ.tsumi||''};
  }

  save();
  WIZ.active=false;
  S.viewDate=todayKey();
  S.screen=WIZ.type;
  render();
}


function closeSrcOther(id){
  const el=document.getElementById('src-other-modal-input');
  const val=el?el.value.trim():'';
  if(val){
    const day=S.db[S.viewDate];
    const r=day?.lotte?.find(x=>x.id===id);
    if(r){r.srcOther=val;save();}
  }
  S.modal=null;S.modalData={};
  render();
}

function timeInputBlur(el, saveFn) {
  let v = el.value.trim().replace(/[^\d:]/g, '');
  if (!v) { el.value = ''; saveFn(); return; }
  // 数字のみ4桁 → HH:MM に変換 (e.g. "1430" → "14:30")
  if (/^\d{3,4}$/.test(v)) {
    v = v.length === 3 ? '0' + v : v;
    v = v.slice(0,2) + ':' + v.slice(2);
  }
  // HH:MM バリデーション
  const m = v.match(/^(\d{1,2}):(\d{2})$/);
  if (m) {
    const h = parseInt(m[1]), min = parseInt(m[2]);
    if (h >= 0 && h <= 23 && min >= 0 && min <= 59) {
      el.value = String(h).padStart(2,'0') + ':' + String(min).padStart(2,'0');
      el.classList.remove('err');
      saveFn();
      return;
    }
  }
  el.classList.add('err');
  el.title = '時刻は HH:MM 形式で入力してください（例: 14:30）';
}

function hasNyukaType(t){
  if(!WIZ.nyukaType) return false;
  return WIZ.nyukaType.split(',').indexOf(t)>=0;
}
function toggleNyukaType(t){
  var arr = WIZ.nyukaType ? WIZ.nyukaType.split(',').filter(function(x){return x;}) : [];
  var i = arr.indexOf(t);
  if(i>=0) arr.splice(i,1);
  else arr.push(t);
  // 順序固定（入荷→出荷）
  var sorted=[];
  if(arr.indexOf('入荷')>=0) sorted.push('入荷');
  if(arr.indexOf('出荷')>=0) sorted.push('出荷');
  WIZ.nyukaType = sorted.join(',');
  renderWizard();
}

function openOrderModal(){
  try { renderOrderModal(); } catch(e) { console.error('openOrderModal error:', e); alert('入力モーダルが開けません: '+e.message); }
}
function renderOrderModal(){
  var old = document.getElementById('_order_overlay');
  if(old) old.remove();
  var buf = WIZ.order || '';

  var ov = document.createElement('div');
  ov.id='_order_overlay'; ov.className='order-modal-overlay';

  var md = document.createElement('div'); md.className='order-modal';

  // 閉じるボタンのクリックでoverlayも閉じる
  var hdr = document.createElement('div'); hdr.className='order-modal-hdr';
  var ttl = document.createElement('div'); ttl.className='order-modal-title'; ttl.textContent='オーダーNo';
  var cls = document.createElement('button'); cls.className='order-modal-close'; cls.type='button';
  cls.textContent='✕';
  cls.onclick = function(){ ov.remove(); };
  hdr.appendChild(ttl); hdr.appendChild(cls); md.appendChild(hdr);

  var dw = document.createElement('div'); dw.className='order-disp-wrap';
  var dp = document.createElement('div'); dp.className='order-disp'+(buf.length===0?' empty':'');
  dp.textContent = buf.length===0 ? '例: 12345 または 12345,67890' : buf;
  dw.appendChild(dp); md.appendChild(dw);

  var kp = document.createElement('div'); kp.className='order-keypad';
  function addKey(lbl, cls, handler){
    var b = document.createElement('button');
    b.type = 'button';
    b.className = cls;
    b.textContent = lbl;
    b.onclick = handler;
    return b;
  }
  [1,2,3,4,5,6,7,8,9].forEach(function(n){
    kp.appendChild(addKey(n, 'order-key', function(){ orderKey(String(n)); }));
  });
  kp.appendChild(addKey(',', 'order-key order-comma', function(){ orderKey(','); }));
  kp.appendChild(addKey('0', 'order-key', function(){ orderKey('0'); }));
  kp.appendChild(addKey('⌫', 'order-key order-del', function(){ orderDel(); }));
  md.appendChild(kp);

  var ok = document.createElement('button'); ok.type='button'; ok.className='order-ok-btn';
  ok.textContent = buf.length>0 ? '確定（'+buf+'）' : 'オーダーNoを入力してください';
  if(buf.length===0) ok.disabled=true;
  ok.onclick = function(){ 
    if(WIZ.order && WIZ.order.length>0) {
      ov.remove();
      renderWizard();
    }
  };
  md.appendChild(ok);

  var sp = document.createElement('div'); sp.style.height='8px'; md.appendChild(sp);
  ov.appendChild(md);
  document.body.appendChild(ov);
}
function orderKey(c){
  if(c===','){
    if(!WIZ.order || WIZ.order.length===0) return;
    if(WIZ.order.endsWith(',')) return;
  }
  WIZ.order = (WIZ.order||'') + c;
  renderOrderModal();
}
function orderDel(){
  WIZ.order = (WIZ.order||'').slice(0,-1);
  renderOrderModal();
}

var _TM = {type:'',id:'',field:'',buf:''};
var _TM_LABELS = {nyuuko:'入庫時間',shukko:'出庫時間',tochaku:'到着時間',basu:'バース着車',sakuEnd:'作業終了',shuppatsu:'出発時間'};

function openTimeModal(type,id,field,cur){
  _TM = {type:type,id:id,field:field,buf:''};
  if(cur && /^\d{2}:\d{2}$/.test(cur)) _TM.buf = cur.replace(':','');
  renderTimeModal();
}
function renderTimeModal(){
  var old = document.getElementById('_tm_overlay');
  if(old) old.remove();
  var buf=_TM.buf;
  var dh = buf.length>=2?buf.slice(0,2):(buf.length===1?buf+'_':'--');
  var dm = buf.length>=4?buf.slice(2,4):(buf.length===3?buf.slice(2)+'_':'--');
  var valid = buf.length===4;
  var hint = buf.length<2?'時（00〜23）を入力':buf.length<4?'分（00〜59）を入力':'OKを押して確定';

  var ov = document.createElement('div');
  ov.id='_tm_overlay'; ov.className='time-modal-overlay';
  var md = document.createElement('div'); md.className='time-modal';

  // header
  var hdr=document.createElement('div'); hdr.className='time-modal-hdr';
  var ttl=document.createElement('div'); ttl.className='time-modal-title'; ttl.textContent=_TM_LABELS[_TM.field]||'時刻入力';
  var cls=document.createElement('button'); cls.className='time-modal-close'; cls.textContent='✕'; cls.onclick=function(){ov.remove();};
  hdr.appendChild(ttl); hdr.appendChild(cls); md.appendChild(hdr);

  // display
  var dw=document.createElement('div'); dw.className='time-disp-wrap';
  var dp=document.createElement('div'); dp.className='time-disp'+(buf.length===0?' empty':'');
  dp.innerHTML = buf.length===0?'--:--':'<span>'+dh+'</span><span style="margin:0 4px;">:</span><span>'+dm+'</span>';
  var ht=document.createElement('div'); ht.className='time-hint'; ht.textContent=hint;
  dw.appendChild(dp); dw.appendChild(ht); md.appendChild(dw);

  // keypad
  var kp=document.createElement('div'); kp.className='time-keypad';
  [1,2,3,4,5,6,7,8,9].forEach(function(n){
    var b=document.createElement('button'); b.className='time-key'; b.textContent=n;
    b.onclick=function(){tmKey(String(n));}; kp.appendChild(b);
  });
  var sp=document.createElement('button'); sp.style.visibility='hidden'; kp.appendChild(sp);
  var z=document.createElement('button'); z.className='time-key'; z.textContent='0'; z.onclick=function(){tmKey('0');}; kp.appendChild(z);
  var dl=document.createElement('button'); dl.className='time-key time-del'; dl.textContent='⌫'; dl.onclick=function(){tmDel();}; kp.appendChild(dl);
  md.appendChild(kp);

  // now button
  var nb=document.createElement('button'); nb.className='time-now-btn';
  nb.textContent='現在時刻を使用（'+nowStr()+'）';
  nb.onclick=function(){ _TM.buf=nowStr().replace(':',''); tmConfirm(); };
  md.appendChild(nb);

  // ok button
  var ok=document.createElement('button'); ok.className='time-ok-btn';
  ok.textContent=valid?'確定（'+dh+':'+dm+'）':'時刻を入力してください';
  if(!valid) ok.disabled=true;
  ok.onclick=function(){if(valid)tmConfirm();};
  md.appendChild(ok);

  var sp2=document.createElement('div'); sp2.style.height='8px'; md.appendChild(sp2);
  ov.appendChild(md);
  document.body.appendChild(ov);
}
function tmKey(n){
  var buf=_TM.buf;
  if(buf.length>=4) return;
  var next=buf+n;
  if(next.length===1 && +n>2) return;
  if(next.length===2 && +next>23) return;
  if(next.length===3 && +n>5) return;
  _TM.buf=next; renderTimeModal();
}
function tmDel(){ _TM.buf=_TM.buf.slice(0,-1); renderTimeModal(); }
function tmConfirm(){
  var buf=_TM.buf; if(buf.length!==4) return;
  var ts=buf.slice(0,2)+':'+buf.slice(2,4);
  var day=S.db[S.viewDate]; if(!day) return;
  var arr=day[_TM.type]; if(!arr) return;
  var r=arr.find(function(x){return x.id===_TM.id;});
  if(r){
    var old=r[_TM.field]; r[_TM.field]=ts;
    if(!isToday()&&old!==ts){
      if(!r.editLog)r.editLog=[];
      r.editLog.push(nowFull()+' '+_TM.field+'「'+(old||'空')+'」→「'+ts+'」');
    }
    save();
  }
  var ov=document.getElementById('_tm_overlay'); if(ov)ov.remove();
  render();
}


// 時刻の直接入力処理
function handleTimeInput(type, id, field, val) {
  if(!val) {
    updField(type, id, field, '');
    return;
  }
  // HHMM → HH:MM 自動変換
  var cleaned = val.replace(/[^0-9]/g,'');
  if(cleaned.length === 3) cleaned = '0' + cleaned;
  if(cleaned.length === 4) {
    var h = parseInt(cleaned.slice(0,2));
    var m = parseInt(cleaned.slice(2,4));
    if(h>=0 && h<=23 && m>=0 && m<=59) {
      var formatted = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      updField(type, id, field, formatted);
      return;
    }
  }
  // HH:MM形式をそのまま
  var m2 = val.match(/^(\d{1,2}):(\d{2})$/);
  if(m2) {
    var h2 = parseInt(m2[1]), mn2 = parseInt(m2[2]);
    if(h2>=0 && h2<=23 && mn2>=0 && mn2<=59) {
      var f2 = String(h2).padStart(2,'0') + ':' + String(mn2).padStart(2,'0');
      updField(type, id, field, f2);
      return;
    }
  }
  // それ以外はそのまま保存
  updField(type, id, field, val);
}
function updField(type, id, field, val) {
  var day = S.db[S.viewDate];
  if(!day) return;
  var r = day[type].find(function(x){ return x.id === id; });
  if(!r || r.deleted) return;
  var old = r[field];
  r[field] = val;
  if(!isToday() && old !== val && old !== undefined && old !== '') {
    if(!r.editLog) r.editLog = [];
    r.editLog.push(nowFull() + ' ' + field + '「'+(old||'空')+'」→「'+val+'」');
  }
  save();
}
